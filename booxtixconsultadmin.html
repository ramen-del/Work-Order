  <div class="title-row"><div><div class="eyebrow">CRM FLOW</div><h1 class="title">1차 접수 → 1차 상담 완료 → 다음액션</h1><p class="desc">기본정보는 읽기 전용으로 확인하고, 상담 탭에서 1차 상담과 다음액션을 한 번에 작성합니다. 저장된 상담 내용은 기본 탭에 자동 반영됩니다.</p></div></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwSU3UrBadGPmhNgkF_4pY2IFP4bBhio5y5dd8BodFBN9450Ldo24Pkgc4INFgZN36hBg/exec";
const BASIC_FIELDS = ['inquiryDate','inquiryTime','name','phone','hasStore','desiredRegion','source','sourceEtc','note'];
const FIRST_FIELDS = ['callStatus','workType','recordFiles','currentSituation','inquiryTopic','detailInquiryMemo','answerType','answerMemo'];
const NEXT_FIELDS = ['nextStep','nextActionDetail','nextActionDate','nextActionTime','nextActionOwner','nextActionMemo','finalStatus'];
const LABELS = {inquiryDate:'문의 일자',inquiryTime:'문의 시간',name:'이름',phone:'연락처',hasStore:'점포 유/무',desiredRegion:'창업 희망지역',source:'유입경로',sourceEtc:'기타 유입경로',note:'비고',callStatus:'상담상태',workType:'작업형태',recordFiles:'통화녹음 업로드',currentSituation:'현재상황',inquiryTopic:'문의주제',detailInquiryMemo:'상세문의 메모',answerType:'답변유형',answerMemo:'답변메모',firstConsultStatus:'1차 상담 상태',firstConsultCompletedAt:'1차 상담 완료일시',nextStep:'다음단계',nextActionDetail:'다음단계 상세내용',nextActionDate:'다음액션 예정일',nextActionTime:'다음액션 예정시간',nextActionOwner:'담당자',nextActionMemo:'다음액션 내부메모',finalStatus:'최종상태'};
let allData = [], filtered = [], currentIdx = null, currentRecordFiles = [];
let sortKey = 'inquiryDateTime', sortAsc = false;
let editHistory = JSON.parse(localStorage.getItem('booxtix_admin_history_v11') || '{}');

function esc(v){return String(v ?? '').replace(/[&<>'"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]));}
function pick(o, keys, fallback=''){for(const k of keys){if(o && o[k] !== undefined && o[k] !== null && String(o[k]).trim() !== '') return String(o[k]).trim();}return fallback;}
function todayKST(){const parts = new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date());const m=Object.fromEntries(parts.map(p=>[p.type,p.value]));return `${m.year}-${m.month}-${m.day}`;}
function nowKST(){return new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});}
function rowId(d){return d.id || d.consultId || [d.inquiryDate,d.inquiryTime,d.name,d.phone].join('|');}
function parseRecordFiles(raw){
  const direct = raw.recordFiles ?? raw.records ?? raw['통화녹음 업로드'] ?? raw['녹음파일'] ?? '';
  if(Array.isArray(direct)) return direct;
  if(typeof direct === 'string' && direct.trim().startsWith('[')){try{return JSON.parse(direct);}catch(err){return [];}}
  if(typeof direct === 'string' && direct.trim()) return [{name:direct,type:'',size:0,src:''}];
  return [];
}
function normalize(raw){
  const d = {...raw};
  d.id = pick(raw,['id','consultId','상담번호','접수번호']) || '';
  d.consultId = pick(raw,['consultId','id','상담번호','접수번호']) || d.id;
  d.inquiryDate = pick(raw,['inquiryDate','문의일자','문의 일자','date','날짜','callDate','통화날짜']);
  d.inquiryTime = pick(raw,['inquiryTime','문의시간','문의 시간','time','시간','callTime','통화시간']);
  d.name = pick(raw,['name','이름','고객명']);
  d.phone = pick(raw,['phone','연락처','전화번호']);
  d.hasStore = pick(raw,['hasStore','점포유무','점포 유/무','점포','storeStatus']);
  d.desiredRegion = pick(raw,['desiredRegion','창업희망지역','창업 희망지역','희망지역','region','지역']);
  d.source = pick(raw,['source','유입경로','유입 경로']);
  d.sourceEtc = pick(raw,['sourceEtc','기타유입경로','기타 유입경로']);
  d.note = pick(raw,['note','비고','basicMemo','메모']);
  d.workflowStatus = pick(raw,['workflowStatus','진행상태'],'1차 접수 완료');
  d.firstConsultStatus = pick(raw,['firstConsultStatus','1차상담상태','1차 상담 상태'], pick(raw,['callStatus','상담상태','통화상태']) ? '1차 상담 완료' : '미작성');
  d.firstConsultCompletedAt = pick(raw,['firstConsultCompletedAt','1차상담완료일시','1차 상담 완료일시']);
  d.callStatus = pick(raw,['callStatus','상담상태','상담 상태','통화상태','통화 상태']);
  d.workType = pick(raw,['workType','작업형태','작업 형태','callRound','통화횟수']);
  d.recordFiles = parseRecordFiles(raw);
  d.currentSituation = pick(raw,['currentSituation','현재상황','현재 상황','situation']);
  d.inquiryTopic = pick(raw,['inquiryTopic','문의주제','문의 주제','topic']);
  d.detailInquiryMemo = pick(raw,['detailInquiryMemo','상세문의메모','상세문의 메모','inquiry','문의내용','문의 내용']);
  d.answerType = pick(raw,['answerType','답변유형','답변 유형']);

function hasRealLead(d){
  const clean = v => String(v || '').trim();
  const isDash = v => /^[-\s]*$/.test(clean(v));
  const phoneLike = v => /\d{2,4}[-\s]?\d{3,4}[-\s]?\d{4}/.test(clean(v));
  const dateLike = v => /^\d{4}-\d{2}-\d{2}$/.test(clean(v));
  const statusLike = v => ['미작성','1차 상담 완료','통화 완료','부재','문자 발송','카톡 발송','재통화 예정','관심 없음','신규 문의','상담 대기'].includes(clean(v));
  if(clean(d.name) && !isDash(d.name) && !dateLike(d.name) && !statusLike(d.name)) return true;
  if(clean(d.phone) && !isDash(d.phone) && phoneLike(d.phone)) return true;
  const strong = [d.inquiryDate,d.desiredRegion,d.note,d.callStatus,d.workType,d.currentSituation,d.inquiryTopic,d.detailInquiryMemo,d.answerMemo,d.nextActionDetail];
  return strong.some(v => clean(v) && !isDash(v) && !statusLike(v)) && (dateLike(d.inquiryDate) || clean(d.note || d.detailInquiryMemo || d.answerMemo));
}
function extractRowsFromResponse(json){
  if(Array.isArray(json)) return json;
  if(!json || typeof json !== 'object') return [];
  const keys = ['data','rows','items','records','list','values','resultRows','leads'];
  for(const k of keys){
    if(Array.isArray(json[k])) return json[k];
  }
  if(json.result && typeof json.result === 'object'){
    for(const k of keys){
      if(Array.isArray(json.result[k])) return json.result[k];
    }
  }
  return [];
}

function fillBasicOriginal(){const d=getCurrent();if(d)renderBasic(d);}
function readBasic(){return {inquiryDate:val('b-inquiryDate'),inquiryTime:val('b-inquiryTime'),name:val('b-name'),phone:val('b-phone'),hasStore:val('b-hasStore'),desiredRegion:val('b-desiredRegion'),source:val('b-source'),sourceEtc:val('b-sourceEtc'),note:val('b-note')};}
function readFirst(){const current=getCurrent()||{};const updates={callStatus:val('c-callStatus'),workType:val('c-workType'),recordFiles:currentRecordFiles,currentSituation:val('c-currentSituation'),inquiryTopic:val('c-inquiryTopic'),detailInquiryMemo:val('c-detailInquiryMemo'),answerType:val('c-answerType'),answerMemo:val('c-answerMemo'),firstConsultStatus:'1차 상담 완료',firstConsultCompletedAt:current.firstConsultCompletedAt || nowKST(),workflowStatus:'1차 상담 완료'};const next=readNext();Object.keys(next).forEach(k=>{if(next[k]) updates[k]=next[k];});if(!updates.nextStep) updates.nextStep=current.nextStep || '상담 대기';if(!updates.finalStatus) updates.finalStatus=current.finalStatus || '후속관리';return updates;}
function readNext(){return {nextStep:val('n-nextStep'),nextActionDetail:val('n-nextActionDetail'),nextActionDate:val('n-nextActionDate'),nextActionTime:val('n-nextActionTime'),nextActionOwner:val('n-nextActionOwner'),nextActionMemo:val('n-nextActionMemo'),finalStatus:val('n-finalStatus')};}
function val(id){const el=document.getElementById(id);return el ? el.value.trim() : '';}
function diffAndApply(d, updates){const changes=[];Object.keys(updates).forEach(k=>{const oldVal = k==='recordFiles' ? JSON.stringify(d[k]||[]) : String(d[k]||'');const newVal = k==='recordFiles' ? JSON.stringify(updates[k]||[]) : String(updates[k]||'');if(oldVal!==newVal){changes.push({field:LABELS[k]||k,old:displayVal(d[k]),new:displayVal(updates[k])});d[k]=updates[k];}});if(updates.inquiryDate||updates.inquiryTime)d.inquiryDateTime=`${d.inquiryDate||'0000-00-00'} ${d.inquiryTime||'00:00'}`;return changes;}
function displayVal(v){if(Array.isArray(v))return v.map(x=>x.name||'파일').join(', ') || '없음';return String(v||'없음');}
function addHistory(id,section,changes){if(!editHistory[id]) editHistory[id]=[];editHistory[id].unshift({time:nowKST(),editor:'관리자',section,changes});localStorage.setItem('booxtix_admin_history_v11',JSON.stringify(editHistory));}
async function persistUpdates(d, updates, section, changes){
  const fd=new FormData();
  fd.append('action','update');
  fd.append('data',JSON.stringify({id:rowId(d),consultId:d.consultId,updates,historyEntry:{time:nowKST(),editor:'관리자',section,changes}}));
  const res=await fetch(APPS_SCRIPT_URL + '?action=update',{method:'POST',body:fd});
  const text=await res.text();
  let result={};
  try{result=JSON.parse(text);}catch(err){result={result:res.ok?'success':'error',raw:text};}
  if(!res.ok || (result.result && result.result!=='success') || (result.status && !['success','ok'].includes(result.status))){throw new Error(result.error||result.message||'서버 저장 실패');}
  if(result.recordFiles || result.savedFiles){updates.recordFiles = result.recordFiles || result.savedFiles;}
  return result;
}
async function saveSection(section, updates){
  const d=getCurrent();
  if(!d)return;
  const copy=JSON.parse(JSON.stringify(d));
  const changes=diffAndApply(d,updates);
  if(!changes.length){showToast('변경된 내용이 없습니다.');return;}
  try{
    const result=await persistUpdates(copy,updates,section,changes);
    if((result.recordFiles||result.savedFiles) && updates.recordFiles){d.recordFiles=updates.recordFiles;currentRecordFiles=[...updates.recordFiles];}
    addHistory(rowId(d),section,changes);
    afterSave(d);
    showToast('✓ 저장되었습니다. 수정내역에 기록했어요.');
  }catch(err){
    Object.assign(d,copy);
    showToast('⚠ 저장 실패: '+err.message);
    renderBasic(d);renderConsult(d);renderHistory(d);
  }
}
function afterSave(d){updateKpi();applyFilter();const refreshed=allData.find(x=>rowId(x)===rowId(d))||d;const idx=filtered.findIndex(x=>rowId(x)===rowId(d));currentIdx=idx>-1?idx:currentIdx;document.getElementById('panelTitle').textContent=`${refreshed.name||'이름 없음'} · ${refreshed.phone||''}`;document.getElementById('panelBadge').innerHTML=`<span class="badge ${statusClass(refreshed.firstConsultStatus)}">${esc(refreshed.firstConsultStatus||'미작성')}</span>`;renderBasic(refreshed);renderConsult(refreshed);renderHistory(refreshed);}
function saveBasic(){saveSection('기본정보',readBasic());}
function saveFirstConsult(){const updates=readFirst();if(!updates.callStatus){showToast('⚠ 상담상태를 선택해주세요');return;}if(!updates.workType){showToast('⚠ 작업형태를 선택해주세요');return;}saveSection('1차 상담',updates);}
function saveNextAction(){const updates=readNext();if(!updates.nextStep){showToast('⚠ 다음단계를 선택해주세요');return;}saveSection('다음액션',updates);}
function renderHistory(d){const hist=editHistory[rowId(d)]||[];document.getElementById('historyCount').textContent=hist.length?`(${hist.length})`:'';if(!hist.length){document.getElementById('historyBody').innerHTML='<div class="history-empty">수정 내역이 없습니다.</div>';return;}document.getElementById('historyBody').innerHTML=hist.map(h=>`<div class="history-item"><div class="history-meta"><span class="history-time">${esc(h.time)}</span><span class="history-editor">${esc(h.editor)}</span><span class="history-section">${esc(h.section||'수정')}</span></div>${h.changes.map(c=>`<div class="history-change"><b>${esc(c.field)}</b> <span class="old">${esc(c.old)}</span> → <span class="new">${esc(c.new)}</span></div>`).join('')}</div>`).join('');}
function setStatus(ok){document.getElementById('statusDot').style.background=ok?'#2D7A55':'#E05252';document.getElementById('statusText').textContent=ok?'연결됨':'오프라인';}
let toastTimer=null;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}
loadData();
</script>
