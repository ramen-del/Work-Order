<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOXTIX · 상담 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--text:#1A1A1A;--sub:#999;--border:#E8E8E4;--soft:#F5F5F3;--bg:#F7F7F5;--ok:#2D7A55;--err:#E05252;--warn:#D97706;--info:#1565C0;--radius:12px}
html,body{min-height:100vh;background:var(--bg);font-family:"Noto Sans KR",sans-serif;color:var(--text)}

/* 기준 화면 상단 레이아웃 */
.nav{background:#fff;border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:100}
.nav img{height:24px;display:block}.word-logo{font-family:"DM Mono",monospace;font-size:13px;font-weight:700;letter-spacing:.2em;color:#111}
.sub-header{height:46px;background:#fff;padding:0 20px;border-bottom:1px solid var(--border);position:sticky;top:70px;z-index:99;text-align:center;display:flex;align-items:center}
.sub-header-inner{max-width:1200px;margin:0 auto;position:relative;display:flex;align-items:center;justify-content:center;gap:12px}
.page-label{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.15em;color:var(--sub);text-transform:uppercase;font-weight:500}
.page-label b{color:var(--text);font-weight:700}.sub-header-right{position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:10px}
.status-indicator{display:flex;align-items:center;gap:6px}.status-dot,.dot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block}.status-text,.status{font-size:11px;color:var(--sub);font-family:"DM Mono",monospace}
.refresh-btn,.btn{padding:7px 14px;background:#fff;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none}
.refresh-btn:hover,.btn:hover{background:var(--soft);border-color:#BBB}.refresh-btn.loading,.btn:disabled{opacity:.6;pointer-events:none}.btn.dark{background:#1A1A1A;color:#fff;border-color:#1A1A1A}.btn.dark:hover{opacity:.86;background:#1A1A1A}

/* MAIN */
.main{max-width:100%;margin:0 auto;padding:36px 34px 60px}.eyebrow{font-family:"DM Mono",monospace;font-size:12px;color:var(--sub);letter-spacing:.18em;margin-bottom:8px;text-transform:uppercase}.title{font-size:30px;font-weight:900;letter-spacing:-.04em;margin-bottom:8px}.desc{font-size:14px;color:#777;margin-bottom:22px;line-height:1.6}
.kpis,.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:30px}.kpi{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:26px 30px}.kpi-label{font-size:14px;font-weight:700;color:var(--sub);letter-spacing:-.01em;margin-bottom:12px}.kpi-value{font-size:34px;font-weight:900;letter-spacing:-.04em;line-height:1}.kpi-sub{font-size:12px;color:var(--sub);margin-top:5px}.kpi-value.ok{color:var(--ok)}.kpi-value.warn{color:var(--warn)}
.filters,.filter-bar{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:22px 26px;margin-bottom:24px;display:flex;gap:14px;align-items:center;flex-wrap:nowrap}.search,.filter-search{flex:1;min-width:320px;position:relative}.search span,.filter-search .ico{position:absolute;left:20px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--sub)}.search input,.filter-search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s;background:#fff}.search input:focus,.filter-search input:focus{border-color:var(--text)}
select,input,textarea{font-family:inherit}.filter-select{padding:9px 32px 9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:#fff url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='10' height='7' viewBox='0 0 10 7'%3e%3cpath d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' fill='none' stroke-linecap='round'/%3e%3c/svg%3e") no-repeat right 10px center;-webkit-appearance:none;appearance:none;outline:none;cursor:pointer;transition:border-color .15s}.filter-select:focus{border-color:var(--text)}.count,.filter-count{font-size:14px;color:var(--sub);font-family:"Noto Sans KR",sans-serif;white-space:nowrap;margin-left:0;padding-left:2px}

/* TABLE */
.table-box,.table-wrap{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}.table-scroll{overflow:auto}.table{min-width:1120px}.thead,.row{display:grid;grid-template-columns:110px 90px 120px 150px 110px 150px 130px minmax(220px,1fr);align-items:center}.thead{min-height:44px;background:#FAFAF9;border-bottom:1px solid var(--border)}.th{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none;white-space:nowrap;padding:0 12px}.th:hover{color:var(--text)}#rows{max-height:calc(100vh - 380px);overflow-y:auto}.row{min-height:54px;border-bottom:1px solid #F5F5F3;cursor:pointer;transition:background .12s}.row:last-child{border-bottom:none}.row:hover{background:#FAFAF9}.td{font-size:13px;color:var(--text);padding:8px 12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}.td.sub{color:var(--sub);font-size:12px}.mono{font-family:"DM Mono",monospace;font-size:11px}.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}.b-ok,.badge.ok{background:#E8F5EE;color:var(--ok)}.b-warn,.badge.warn{background:#FEF3C7;color:var(--warn)}.b-err,.badge.err{background:#FEE2E2;color:var(--err)}.b-info,.badge.info{background:#DBEAFE;color:var(--info)}.b-gray,.badge.grey{background:#F0F0EE;color:#666}
.empty,.loading{padding:60px 20px;text-align:center;color:var(--sub);font-size:13px}.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}@keyframes spin{to{transform:rotate(360deg)}}

/* PANEL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none}.overlay.show{display:block}.panel{position:fixed;top:0;right:0;bottom:0;width:min(680px,100vw);background:#fff;z-index:201;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;border-left:1px solid var(--border);overflow:hidden}.panel.show{transform:translateX(0)}.panel-head{padding:16px 20px;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;gap:10px;flex-shrink:0}.close{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:.15s}.close:hover{background:var(--soft)}.panel-title{font-size:15px;font-weight:700;letter-spacing:-.02em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.panel-meta{font-size:12px;color:var(--sub);margin-top:2px}.tabs{display:flex;border-bottom:1px solid var(--border);background:#fff;flex-shrink:0}.tab{flex:1;padding:12px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;text-align:center;border-bottom:2px solid transparent;transition:.15s}.tab.active{color:var(--text);border-bottom-color:var(--text)}.panel-body{flex:1;overflow-y:auto}.view{display:none;padding:20px}.view.active{display:block}.section{margin-bottom:22px}.section-title{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:flex;flex-direction:column;gap:3px;min-width:0}.label{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.06em;text-transform:uppercase}.value{font-size:13px;font-weight:500;color:var(--text);line-height:1.5;word-break:break-all}.full{grid-column:1/-1}.memo{background:var(--soft);border-radius:8px;padding:12px;font-size:13px;line-height:1.7;color:#333;white-space:pre-wrap}.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.edit-group{margin-bottom:16px}.edit-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;display:block}.edit-input,.edit-select,.edit-textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:border-color .15s}.edit-input:focus,.edit-select:focus,.edit-textarea:focus{border-color:var(--text)}.edit-textarea{resize:vertical;min-height:72px;line-height:1.6}.edit-select{-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='10' height='7' viewBox='0 0 10 7'%3e%3cpath d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' fill='none' stroke-linecap='round'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 10px center;padding-right:32px;cursor:pointer}.file-box{border:2px dashed var(--border);border-radius:13px;padding:18px;text-align:center;cursor:pointer;background:#FAFAF9;display:block}.file-box:hover{border-color:#aaa}.file-box input{display:none}.file-list{margin-top:8px}.file-item{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:10px;padding:9px 10px;margin-top:6px;font-size:13px}.file-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.del{cursor:pointer;color:#999;font-weight:900}.actions{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:8px;background:#fff;flex-shrink:0}.actions .btn{height:48px;flex:1;font-size:15px}.history-item{border-bottom:1px solid var(--border);padding:14px 0}.history-top{display:flex;gap:8px;align-items:center;margin-bottom:6px}.history-time{font-family:"DM Mono",monospace;font-size:12px;color:var(--sub)}.history-editor{font-size:12px;font-weight:800;background:var(--soft);padding:3px 8px;border-radius:6px}.change{font-size:13px;background:#FAFAF9;border-left:3px solid var(--border);border-radius:7px;padding:8px 10px;margin-top:5px}.old{color:var(--err);text-decoration:line-through}.new{color:var(--ok);font-weight:800}.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:500;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1}
@media(max-width:900px){.kpis,.kpi-row{grid-template-columns:1fr 1fr}.filters,.filter-bar{align-items:stretch;flex-direction:column}.filter-select{width:100%}.grid,.edit-grid{grid-template-columns:1fr}.main{padding-left:14px;padding-right:14px}.sub-header-right{position:static;transform:none;margin-top:8px}.sub-header-inner{flex-direction:column}.panel{width:100%;border-left:none}.table{min-width:940px}}

<body>
<div class="nav"><div class="nav-logo">BOOSTIX</div></div>
<div class="sub-header">
  <div class="sub-header-inner">
    <div class="page-label"><b>가맹상담 관리</b> · 실시간 대시보드</div>
    <div class="sub-header-right">
      <div class="status-indicator"><span class="status-dot" id="statusDot"></span><span class="status-text" id="statusText">연결 중</span></div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ 새로고침</button>
    </div>
  </div>
</div>
<main class="main">
  <div class="kpis">
    <div class="kpi"><div class="kpi-label">전체 상담</div><div class="kpi-value" id="k-total">0</div><div class="kpi-sub">누적 건수</div></div>
    <div class="kpi"><div class="kpi-label">오늘 상담</div><div class="kpi-value ok" id="k-today">0</div><div class="kpi-sub" id="k-date">-</div></div>
    <div class="kpi"><div class="kpi-label">고관심 리드</div><div class="kpi-value warn" id="k-pending">0</div><div class="kpi-sub">🔥 매우 높음 + 높음</div></div>
    <div class="kpi"><div class="kpi-label">재통화 예정</div><div class="kpi-value" id="k-next">0</div><div class="kpi-sub">다음 액션 필요</div></div>
  </div>
  <div class="filters">
    <div class="search"><span>🔍</span><input id="q" placeholder="이름, 연락처, 지역 검색..." oninput="applyFilter()"></div>
    <select id="f-manager" class="filter-select" onchange="applyFilter()"><option value="">담당자 전체</option></select>
    <select id="f-interest" class="filter-select" onchange="applyFilter()"><option value="">관심도 전체</option></select>
    <select id="f-status" class="filter-select" onchange="applyFilter()"><option value="">통화상태 전체</option></select>
    <select id="f-next" class="filter-select" onchange="applyFilter()" style="display:none"><option value="">다음단계 전체</option></select>
    <select id="sort" class="filter-select" onchange="applyFilter()" style="display:none"><option value="latest">문의일 최신순</option><option value="oldest">문의일 오래된순</option><option value="name">이름순</option><option value="id">상담번호순</option><option value="submittedAt">제출일시순</option></select>
    <div class="count" id="count">0 건</div>
  </div>
  <div class="table-box"><div class="table-scroll"><div class="table">
    <div class="thead"><div class="th" onclick="setSort('inquiryDate')">문의일자</div><div class="th" onclick="setSort('inquiryTime')">문의시간</div><div class="th" onclick="setSort('name')">이름</div><div class="th">연락처</div><div class="th">점포</div><div class="th">창업희망</div><div class="th">유입경로</div><div class="th">비고</div></div>
    <div id="rows"><div class="loading"><span class="spinner"></span>데이터 불러오는 중</div></div>
  </div></div></div>
</main>
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<aside class="panel" id="panel"><div class="panel-head"><button class="close" onclick="closePanel()">×</button><div><div class="panel-title" id="panelTitle">상담 상세</div><div class="panel-meta" id="panelMeta">-</div></div></div><div class="tabs"><div class="tab active" onclick="switchTab('basic')">기본</div><div class="tab" onclick="switchTab('consult')">상담</div><div class="tab" onclick="switchTab('history')">수정내역</div></div><div class="panel-body"><div class="view active" id="basicView"></div><div class="view" id="consultView"></div><div class="view" id="historyView"></div></div><div class="actions" id="actions" style="display:none"><button class="btn" onclick="fillConsultForm(current)">되돌리기</button><button class="btn dark" id="saveBtn" onclick="saveConsult()">상담 저장</button></div></aside>
<div class="toast" id="toast"></div>
<script>

const ALIAS = {
  id:['상담번호','id','consultId'], submittedAt:['제출일시','submittedAt'],
  inquiryDate:['문의일자','inquiryDate','callDate','통화날짜'], inquiryTime:['문의시간','inquiryTime','callTime','통화시간'],
  name:['이름','name'], phone:['연락처','phone'], hasStore:['점포','점포유무','점포 유/무','hasStore','shopSize','점포규모'], desiredRegion:['창업희망지역','창업 희망지역','desiredRegion','지역','region'], note:['비고','note','internalMemo','내부메모'],
  manager:['담당자','manager','nextActionOwner'], source:['유입경로','source'], region:['지역','region','desiredRegion','창업희망지역'], shopSize:['점포규모','shopSize'], age:['연령대','age'], gender:['성별','gender'], callStatus:['통화상태','callStatus'], callDate:['통화날짜','callDate','inquiryDate'], callTime:['통화시간','callTime','inquiryTime'], callRound:['통화횟수','callRound'], interest:['관심도','interest'], will:['창업의지','will'], openTime:['오픈시점','openTime'], budget:['창업비용상태','budget'], situation:['현재상황','situation','currentSituation'], topic:['문의주제','topic','inquiryTopic'], inquiry:['상세문의','inquiry','detailInquiryMemo','상세문의메모'], answerType:['답변유형','answerType'], answerMemo:['답변메모','answerMemo'], nextStep:['다음단계','nextStep'], recallDate:['재통화날짜','recallDate','nextActionDate'], recallTime:['재통화시간','recallTime','nextActionTime'], meetingDate:['미팅날짜','meetingDate'], meetingRound:['미팅회차','meetingRound'], preContract:['가계약여부','preContract'], contractDate:['계약예정일','contractDate'], finalStatus:['최종상태','finalStatus'], holdReason:['보류사유','holdReason'], internalMemo:['내부메모','internalMemo','nextActionMemo'], recordLinks:['녹음링크','recordLinks'], htmlUrl:['HTML보기','htmlUrl'], folderUrl:['폴더링크','folderUrl'], editCount:['수정횟수','editCount']
};
let all=[], filtered=[], current=null, currentIndex=-1, recordsToUpload=[], hist=JSON.parse(localStorage.getItem('booxtix_admin_history')||'{}'), sortKey='latest';
function pick(o, keys){for(const k of keys){if(o && o[k]!==undefined && o[k]!==null && String(o[k]).trim()!=='') return String(o[k]).trim();}return ''}
function cleanTime(v){v=String(v||'').trim();if(!v||v==='-')return '';if(/^1899-12-3[01]$/.test(v))return '';const m=v.match(/T(\d{2}):(\d{2})/);if(v.includes('1899-12')&&m)return `${m[1]}:${m[2]}`;if(/^\d{4}-\d{2}-\d{2}T/.test(v)&&m)return `${m[1]}:${m[2]}`;return v.replace(/^오전\s*/,'오전 ').replace(/^오후\s*/,'오후 ')}
function cleanDate(v){v=String(v||'').trim();if(!v||v==='-')return '';if(/^\d{4}-\d{2}-\d{2}T/.test(v))return v.slice(0,10);if(v.includes('1899-12'))return '';return v}
function normalize(r){const o={};for(const [key] of FIELDS){o[key]=pick(r, ALIAS[key]||[key]);}o.inquiryTime=cleanTime(o.inquiryTime);o.callTime=cleanTime(o.callTime);o.recallTime=cleanTime(o.recallTime);o.inquiryDate=cleanDate(o.inquiryDate);o.callDate=cleanDate(o.callDate);o.recallDate=cleanDate(o.recallDate);o.meetingDate=cleanDate(o.meetingDate);o.contractDate=cleanDate(o.contractDate);o.submittedAt=String(o.submittedAt||'').replace('T',' ').replace(/\.\d+Z$/,'');return o}
function validRow(r){return !!(r.id||r.name||r.phone)}
async function loadData(){const btn=document.getElementById('refreshBtn');btn.disabled=true;btn.textContent='↻ 로딩 중';document.getElementById('rows').innerHTML='<div class="loading"><span class="spinner"></span>데이터 불러오는 중</div>';try{const res=await fetch(APPS_SCRIPT_URL+'?action=list&_='+Date.now());const json=await res.json();const arr=Array.isArray(json.data)?json.data:(Array.isArray(json.records)?json.records:[]);all=arr.map(normalize).filter(validRow);setStatus(true);buildFilters();applyFilter();}catch(e){console.error(e);setStatus(false);document.getElementById('rows').innerHTML='<div class="empty">연결 실패. Apps Script URL 또는 배포 권한을 확인해주세요.</div>';toast('연결 실패');}finally{btn.disabled=false;btn.textContent='↻ 새로고침'}}
function setStatus(ok){document.getElementById('statusDot').style.background=ok?'#2D7A55':'#E05252';document.getElementById('statusText').textContent=ok?'연결됨':'오프라인'}
function buildFilters(){fillSelect('f-manager',[...new Set(all.map(x=>x.manager).filter(Boolean))],'담당자 전체');fillSelect('f-status',[...new Set(all.map(x=>x.callStatus).filter(Boolean))],'통화상태 전체');fillSelect('f-interest',[...new Set(all.map(x=>x.interest).filter(Boolean))],'관심도 전체');fillSelect('f-next',[...new Set(all.map(x=>x.nextStep).filter(Boolean))],'다음단계 전체')}
function fillSelect(id,vals,first){const el=document.getElementById(id);const cur=el.value;el.innerHTML='<option value="">'+first+'</option>'+vals.map(v=>`<option>${esc(v)}</option>`).join('');el.value=cur}
function setSort(k){sortKey=k;applyFilter()}
function applyFilter(){sortKey=document.getElementById('sort').value||sortKey;const q=document.getElementById('q').value.toLowerCase();const fm=document.getElementById('f-manager').value, fs=document.getElementById('f-status').value, fi=document.getElementById('f-interest').value, fn=document.getElementById('f-next').value;filtered=all.filter(d=>{if(q&&!['id','name','phone','desiredRegion','region','source','note','topic','inquiry'].some(k=>(d[k]||'').toLowerCase().includes(q)))return false;if(fm&&d.manager!==fm)return false;if(fs&&d.callStatus!==fs)return false;if(fi&&d.interest!==fi)return false;if(fn&&d.nextStep!==fn)return false;return true});filtered.sort(sorter);renderRows();updateKpi()}
function sorter(a,b){if(sortKey==='oldest')return compareKey(a,b);if(sortKey==='inquiryDate')return compareKey(b,a);if(sortKey==='inquiryTime')return (b.inquiryTime||b.callTime||'').localeCompare(a.inquiryTime||a.callTime||'');if(sortKey==='name')return (a.name||'').localeCompare(b.name||'','ko');if(sortKey==='id')return (b.id||'').localeCompare(a.id||'');if(sortKey==='submittedAt')return (b.submittedAt||'').localeCompare(a.submittedAt||'');return compareKey(b,a)}
function compareKey(a,b){return ((a.inquiryDate||a.submittedAt||a.callDate||a.id||'') + ' ' + (a.inquiryTime||a.callTime||'')).localeCompare(((b.inquiryDate||b.submittedAt||b.callDate||b.id||'') + ' ' + (b.inquiryTime||b.callTime||'')))}
function updateKpi(){const today=new Date().toISOString().slice(0,10);document.getElementById('k-total').textContent=all.length;document.getElementById('k-today').textContent=all.filter(x=>(x.inquiryDate||x.submittedAt||x.callDate).startsWith(today)).length;document.getElementById('k-date').textContent=today;document.getElementById('k-pending').textContent=all.filter(x=>x.interest==='매우 높음'||x.interest==='높음').length;document.getElementById('k-next').textContent=all.filter(x=>(x.nextStep||'').includes('재통화')||(x.callStatus||'').includes('재통화')).length;document.getElementById('count').textContent=filtered.length+' 건'}
function badge(v,type){const cls=type==='ok'?'b-ok':type==='err'?'b-err':type==='info'?'b-info':type==='warn'?'b-warn':'b-gray';return `<span class="badge ${cls}">${esc(v||'-')}</span>`}
function statusBadge(v){if(!v)return badge('미작성','warn');if(v.includes('완료'))return badge(v,'ok');if(v.includes('부재')||v.includes('재통화'))return badge(v,'warn');if(v.includes('관심 없음'))return badge(v,'err');return badge(v,'gray')}
function nextBadge(v){if(!v)return badge('미정','gray');if(v.includes('계약')||v.includes('미팅'))return badge(v,'ok');if(v.includes('재통화')||v.includes('상담'))return badge(v,'warn');if(v.includes('보류'))return badge(v,'err');return badge(v,'gray')}
function renderRows(){if(!filtered.length){document.getElementById('rows').innerHTML='<div class="empty">표시할 상담이 없습니다.</div>';return}document.getElementById('rows').innerHTML=filtered.map((d,i)=>`<div class="row" onclick="openPanel(${i})"><div class="td mono">${esc(d.inquiryDate||d.callDate||'-')}</div><div class="td sub">${esc(d.inquiryTime||d.callTime||'-')}</div><div class="td"><b>${esc(d.name||'-')}</b></div><div class="td sub">${esc(d.phone||'-')}</div><div class="td">${esc(d.hasStore||'-')}</div><div class="td sub">${esc(d.desiredRegion||d.region||'-')}</div><div class="td sub">${esc(d.source||'-')}</div><div class="td sub">${esc(d.note||'-')}</div></div>`).join('')}
function shortDateTime(v){v=String(v||'');return v.replace(/:\d{2}$/,'')}
function openPanel(i){currentIndex=i;current=filtered[i];recordsToUpload=[];document.getElementById('panelTitle').textContent=(current.name||'-')+' · '+(current.phone||'-');document.getElementById('panelMeta').textContent=current.id||'-';renderBasic();renderConsult();renderHistory();switchTab('basic');document.getElementById('overlay').classList.add('show');document.getElementById('panel').classList.add('show')}
function closePanel(){document.getElementById('overlay').classList.remove('show');document.getElementById('panel').classList.remove('show');current=null;currentIndex=-1}
function switchTab(t){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));const idx={basic:0,consult:1,history:2}[t];document.querySelectorAll('.tab')[idx].classList.add('active');document.getElementById(t+'View').classList.add('active');document.getElementById('actions').style.display=t==='consult'?'flex':'none'}
function fieldHtml(label,val){return `<div class="field"><div class="label">${esc(label)}</div><div class="value">${esc(val||'-')}</div></div>`}
function memoHtml(label,val){return `<div class="field full"><div class="label">${esc(label)}</div><div class="memo">${esc(val||'-')}</div></div>`}
function renderBasic(){const d=current;document.getElementById('basicView').innerHTML=`<div class="section"><div class="section-title">엑셀 메인 리스트 기준</div><div class="grid">${fieldHtml('상담번호',d.id)}${fieldHtml('제출일시',d.submittedAt)}${fieldHtml('이름',d.name)}${fieldHtml('연락처',d.phone)}${fieldHtml('담당자',d.manager)}${fieldHtml('유입경로',d.source)}${fieldHtml('지역',d.region)}${fieldHtml('점포규모',d.shopSize)}${fieldHtml('연령대',d.age)}${fieldHtml('성별',d.gender)}${fieldHtml('통화상태',d.callStatus)}${fieldHtml('통화일시',[d.callDate,d.callTime].filter(Boolean).join(' '))}${fieldHtml('관심도',d.interest)}${fieldHtml('창업의지',d.will)}${fieldHtml('오픈시점',d.openTime)}${fieldHtml('창업비용상태',d.budget)}${fieldHtml('현재상황',d.situation)}${fieldHtml('문의주제',d.topic)}${memoHtml('상세문의',d.inquiry)}${memoHtml('답변메모',d.answerMemo)}${fieldHtml('다음단계',d.nextStep)}${fieldHtml('재통화', [d.recallDate,d.recallTime].filter(Boolean).join(' '))}${fieldHtml('미팅', [d.meetingDate,d.meetingRound].filter(Boolean).join(' '))}${fieldHtml('가계약여부',d.preContract)}${fieldHtml('계약예정일',d.contractDate)}${fieldHtml('최종상태',d.finalStatus)}${fieldHtml('보류사유',d.holdReason)}${memoHtml('내부메모',d.internalMemo)}</div><div class="links">${d.folderUrl?`<a class="btn" target="_blank" href="${escAttr(d.folderUrl)}">고객 폴더 열기</a>`:''}${d.htmlUrl?`<a class="btn" target="_blank" href="${escAttr(d.htmlUrl)}">상담기록 HTML 열기</a>`:''}</div></div>`}
function renderConsult(){const d=current;document.getElementById('consultView').innerHTML=`<div class="section"><div class="section-title">상담 작성 / 수정</div><div class="edit-grid">${selectField('callStatus','통화상태',['','통화 완료','부재','문자 발송','카톡 발송','재통화 예정','관심 없음'])}${dateField('callDate','통화날짜')}${timeField('callTime','통화시간')}${selectField('callRound','통화횟수',['','1차','2차','3차+','미팅 전','미팅 후','계약 전','보류 관리'])}${selectField('interest','관심도',['','매우 높음','높음','보통','낮음','단순 문의'])}${selectField('will','창업의지',['','바로 창업 희망','1개월 내 검토','3개월 내 검토','장기 검토','정보 수집 단계'])}${selectField('openTime','오픈시점',['','즉시','1개월 이내','3개월 이내','6개월 이내','미정'])}${selectField('budget','창업비용상태',['','충분','적정','부족','대출 필요','미확인'])}${inputField('situation','현재상황')}${inputField('topic','문의주제')}${selectField('answerType','답변유형',['','통화 답변','문자 답변','카톡 답변','자료 발송','미답변'])}</div>${textareaField('inquiry','상세문의')}${textareaField('answerMemo','답변메모')}</div><div class="section"><div class="section-title">다음단계</div><div class="edit-grid">${selectField('nextStep','다음단계',['','재통화','미팅 예약','자료 발송','내부 검토','상권 확인','가계약','계약 진행','보류','종료','없음'])}${dateField('recallDate','재통화날짜')}${timeField('recallTime','재통화시간')}${dateField('meetingDate','미팅날짜')}${selectField('meetingRound','미팅회차',['','1차','2차','3차+'])}${selectField('preContract','가계약여부',['','예정','완료','없음'])}${dateField('contractDate','계약예정일')}${selectField('finalStatus','최종상태',['','상담 중','계약 임박','계약 완료','보류','관리 불필요','신규 문의'])}${inputField('manager','담당자')}${inputField('holdReason','보류사유')}</div>${textareaField('internalMemo','내부메모')}</div><div class="section"><div class="section-title">통화녹음 추가 업로드</div><label class="file-box">🎙️ 파일 선택<input type="file" accept=".mp3,.m4a,.wav,audio/*" multiple onchange="addRecords(this)"></label><div class="file-list" id="fileList"></div>${renderRecordLinks(d.recordLinks)}</div>`;fillConsultForm(d)}
function renderRecordLinks(v){const list=String(v||'').split('\n').filter(Boolean);if(!list.length)return '';return '<div class="links">'+list.map((u,i)=>`<a class="btn" target="_blank" href="${escAttr(u)}">녹음 ${i+1}</a>`).join('')+'</div>'}
function inputField(k,l){return `<div class="edit-group"><label class="edit-label">${l}</label><input class="edit-input" id="e-${k}"></div>`}
function dateField(k,l){return `<div class="edit-group"><label class="edit-label">${l}</label><input type="date" class="edit-input" id="e-${k}"></div>`}
function timeField(k,l){return `<div class="edit-group"><label class="edit-label">${l}</label><input type="time" class="edit-input" id="e-${k}"></div>`}
function textareaField(k,l){return `<div class="edit-group"><label class="edit-label">${l}</label><textarea class="edit-textarea" id="e-${k}"></textarea></div>`}
function selectField(k,l,opts){return `<div class="edit-group"><label class="edit-label">${l}</label><select class="edit-select" id="e-${k}">${opts.map(o=>`<option value="${escAttr(o)}">${esc(o||'선택')}</option>`).join('')}</select></div>`}
const EDIT_KEYS=['manager','callStatus','callDate','callTime','callRound','interest','will','openTime','budget','situation','topic','inquiry','answerType','answerMemo','nextStep','recallDate','recallTime','meetingDate','meetingRound','preContract','contractDate','finalStatus','holdReason','internalMemo'];
function fillConsultForm(d){EDIT_KEYS.forEach(k=>{const el=document.getElementById('e-'+k);if(el)el.value=d[k]||''});renderFileList()}
function addRecords(input){Array.from(input.files).forEach(file=>{if(file.size>25*1024*1024){toast('25MB 초과 파일은 제외했습니다');return}const reader=new FileReader();reader.onload=e=>{recordsToUpload.push({name:file.name,type:file.type,size:file.size,src:e.target.result});renderFileList()};reader.readAsDataURL(file)});input.value=''}
function renderFileList(){const el=document.getElementById('fileList');if(!el)return;el.innerHTML=recordsToUpload.map((f,i)=>`<div class="file-item"><span>🎵</span><span class="name">${esc(f.name)}</span><span class="del" onclick="recordsToUpload.splice(${i},1);renderFileList()">×</span></div>`).join('')}
async function saveConsult(){if(!current)return;const updates={},changes=[];EDIT_KEYS.forEach(k=>{const el=document.getElementById('e-'+k);if(!el)return;const nv=el.value.trim(), ov=String(current[k]||'').trim();updates[k]=nv;if(nv!==ov){changes.push({field:labelOf(k),old:ov||'없음',new:nv||'없음'});current[k]=nv}});if(!changes.length && recordsToUpload.length===0){toast('변경된 내용이 없습니다');return}const payload={id:current.id,consultId:current.id,updates,newRecords:recordsToUpload};const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='저장 중';try{const fd=new FormData();fd.append('action','update');fd.append('data',JSON.stringify(payload));const res=await fetch(APPS_SCRIPT_URL,{method:'POST',body:fd});const json=await res.json().catch(()=>({result:'unknown'}));if(json.result&&json.result!=='success')throw new Error(json.message||'저장 실패');if(!hist[current.id])hist[current.id]=[];hist[current.id].unshift({time:new Date().toLocaleString('ko-KR'),editor:'관리자',changes:changes.concat(recordsToUpload.length?[{field:'녹음파일',old:'없음',new:recordsToUpload.length+'개 추가'}]:[])});localStorage.setItem('booxtix_admin_history',JSON.stringify(hist));recordsToUpload=[];toast('저장 완료');await loadData();const updated=all.find(x=>x.id===current.id);if(updated){current=updated;renderBasic();renderConsult();renderHistory()}}catch(e){console.error(e);toast('저장 실패: '+e.message)}finally{btn.disabled=false;btn.textContent='상담 저장'}}
function renderHistory(){const h=hist[current.id]||[];document.getElementById('historyView').innerHTML=h.length?h.map(item=>`<div class="history-item"><div class="history-top"><span class="history-time">${esc(item.time)}</span><span class="history-editor">${esc(item.editor)}</span></div>${item.changes.map(c=>`<div class="change"><b>${esc(c.field)}</b> <span class="old">${esc(c.old)}</span> → <span class="new">${esc(c.new)}</span></div>`).join('')}</div>`).join(''):'<div class="empty">이 브라우저에 저장된 수정내역이 없습니다.</div>'}
function labelOf(k){const found=FIELDS.find(x=>x[0]===k);return found?found[1]:k}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function escAttr(s){return esc(s).replace(/'/g,'&#39;')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove('show'),2600)}
loadData();
</script>
</body>
</html>
