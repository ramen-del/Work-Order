<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOXTIX · 상담 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--text:#1A1A1A;--sub:#999;--border:#E8E8E4;--soft:#F5F5F3;--ok:#2D7A55;--err:#E05252;--warn:#D97706;--info:#1565C0;--radius:12px}
html,body{min-height:100vh;background:#F7F7F5;font-family:"Noto Sans KR",sans-serif;color:var(--text)}
.nav{background:#fff;border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:100}
.nav img{height:24px}
.sub-header{background:#fff;padding:10px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:99}
.sub-header-inner{max-width:1200px;margin:0 auto;position:relative;display:flex;align-items:center;justify-content:center;gap:12px}
.page-label{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.15em;color:var(--sub);text-transform:uppercase;font-weight:500}
.page-label b{color:var(--text);font-weight:700}
.sub-header-right{position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:10px}
.status-indicator{display:flex;align-items:center;gap:6px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#2D7A55}
.status-text{font-size:11px;color:var(--sub);font-family:"DM Mono",monospace}
.refresh-btn{padding:7px 14px;background:#fff;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;gap:6px}
.refresh-btn:hover{background:var(--soft);border-color:#BBB}
.refresh-btn.loading{opacity:.6;pointer-events:none}
.main{max-width:1200px;margin:0 auto;padding:24px 20px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:18px 20px}
.kpi-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:700;letter-spacing:-.03em;line-height:1}
.kpi-sub{font-size:12px;color:var(--sub);margin-top:5px}
.kpi-value.ok{color:var(--ok)}.kpi-value.warn{color:var(--warn)}
.filter-bar{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-search{flex:1;min-width:180px;position:relative}
.filter-search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s}
.filter-search input:focus{border-color:var(--text)}
.filter-search .ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--sub)}
.filter-select{padding:9px 32px 9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:#fff url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='10' height='7' viewBox='0 0 10 7'%3e%3cpath d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' fill='none' stroke-linecap='round'/%3e%3c/svg%3e") no-repeat right 10px center;-webkit-appearance:none;appearance:none;outline:none;cursor:pointer;transition:border-color .15s}
.filter-select:focus{border-color:var(--text)}
.filter-count{font-size:12px;color:var(--sub);font-family:"DM Mono",monospace;white-space:nowrap;margin-left:auto}
.table-wrap{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.table-head{display:grid;grid-template-columns:100px 90px 80px 90px 80px 90px 1fr 100px;padding:10px 16px;border-bottom:1px solid var(--border);gap:8px}
.th{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none;white-space:nowrap}
.th:hover{color:var(--text)}
.table-body{max-height:calc(100vh - 380px);overflow-y:auto}
.table-row{display:grid;grid-template-columns:100px 90px 80px 90px 80px 90px 1fr 100px;padding:12px 16px;border-bottom:1px solid #F5F5F3;gap:8px;cursor:pointer;transition:background .12s;align-items:center}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:#FAFAF9}
.td{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.td.sub{color:var(--sub);font-size:12px}
.td.mono{font-family:"DM Mono",monospace;font-size:11px}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge.ok{background:#E8F5EE;color:var(--ok)}.badge.warn{background:#FEF3C7;color:var(--warn)}.badge.err{background:#FEE2E2;color:var(--err)}.badge.info{background:#DBEAFE;color:var(--info)}.badge.grey{background:#F0F0EE;color:#666}
.edit-dot{width:6px;height:6px;border-radius:50%;background:var(--info);display:inline-block;margin-left:4px;vertical-align:middle;flex-shrink:0}
.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
.panel-overlay.show{display:block}
.panel{position:fixed;top:0;right:0;bottom:0;width:520px;background:#fff;z-index:201;border-left:1px solid var(--border);transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow:hidden;display:flex;flex-direction:column}
.panel.show{transform:translateX(0)}
.panel-head{padding:16px 20px;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;gap:10px;flex-shrink:0}
.panel-close{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:.15s}
.panel-close:hover{background:var(--soft)}
.panel-title{font-size:15px;font-weight:700;letter-spacing:-.02em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);background:#fff;flex-shrink:0}
.panel-tab{flex:1;padding:12px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;text-align:center;border-bottom:2px solid transparent;transition:.15s}
.panel-tab.active{color:var(--text);border-bottom-color:var(--text)}
.panel-content{flex:1;overflow-y:auto}
.panel-view{display:none;padding:20px}
.panel-view.active{display:block}
.panel-section{margin-bottom:22px}
.panel-section-title{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.panel-field{display:flex;flex-direction:column;gap:3px}
.panel-label{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.06em;text-transform:uppercase}
.panel-value{font-size:13px;font-weight:500;color:var(--text);line-height:1.5}
.memo-box{background:var(--soft);border-radius:8px;padding:12px;font-size:13px;line-height:1.7;color:#333;white-space:pre-wrap}
.next-step-box{background:#1A1A1A;border-radius:10px;padding:14px 16px;color:#fff;margin-bottom:12px}
.next-step-label{font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:4px;font-family:"DM Mono",monospace}
.next-step-value{font-size:14px;font-weight:600}
.next-step-date{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px;font-family:"DM Mono",monospace}
.edit-group{margin-bottom:16px}
.edit-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;display:block}
.edit-input,.edit-select,.edit-textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:border-color .15s}
.edit-input:focus,.edit-select:focus,.edit-textarea:focus{border-color:var(--text)}
.edit-textarea{resize:vertical;min-height:72px;line-height:1.6}
.edit-select{-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='10' height='7' viewBox='0 0 10 7'%3e%3cpath d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' fill='none' stroke-linecap='round'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 10px center;padding-right:32px;cursor:pointer}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.edit-chip-group{display:flex;flex-wrap:wrap;gap:6px}
.edit-chip{padding:7px 12px;border:1px solid var(--border);border-radius:20px;background:#fff;font-size:12px;font-weight:500;color:#555;cursor:pointer;transition:.15s;user-select:none}
.edit-chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.edit-actions{padding:16px 20px;border-top:1px solid var(--border);background:#fff;flex-shrink:0;display:flex;gap:8px}
.save-btn{flex:2;padding:13px;background:var(--text);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.save-btn:hover{opacity:.85}
.cancel-btn{flex:1;padding:13px;background:#fff;color:var(--text);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.cancel-btn:hover{background:var(--soft)}
.history-empty{padding:40px 20px;text-align:center;color:var(--sub);font-size:13px}
.history-item{padding:14px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.history-item:last-child{border-bottom:none}
.history-meta{display:flex;align-items:center;gap:8px}
.history-time{font-family:"DM Mono",monospace;font-size:11px;color:var(--sub)}
.history-editor{font-size:12px;font-weight:600;background:var(--soft);padding:2px 8px;border-radius:4px}
.history-changes{display:flex;flex-direction:column;gap:4px}
.history-change{font-size:12px;line-height:1.5;background:#F8F8F6;border-radius:6px;padding:8px 10px;border-left:2px solid var(--border)}
.history-change .field-name{font-weight:700;color:var(--sub)}
.history-change .old-val{color:var(--err);text-decoration:line-through;margin-right:4px}
.history-change .new-val{color:var(--ok);font-weight:600}
.empty{padding:60px 20px;text-align:center}
.empty-icon{font-size:40px;margin-bottom:12px;display:block}
.empty-title{font-size:15px;font-weight:600;margin-bottom:6px}
.empty-desc{font-size:13px;color:var(--sub);line-height:1.6}
.loading-row{padding:40px;text-align:center;color:var(--sub);font-size:13px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:500;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:900px){
  .kpi-row{grid-template-columns:1fr 1fr}
  .table-head,.table-row{grid-template-columns:90px 80px 80px 1fr 90px}
  .th:nth-child(3),.td:nth-child(3),.th:nth-child(5),.td:nth-child(5),.th:nth-child(6),.td:nth-child(6){display:none}
  .panel{width:100%;border-left:none;border-top:1px solid var(--border)}
  .sub-header-right{position:static;transform:none;margin-top:8px}
  .sub-header-inner{flex-direction:column}
}
</style>
</head>

      </div>

        <div class="edit-group"><label class="edit-label">최종 상태</label><select class="edit-select" id="e-finalStatus"><option>상담 중</option><option>계약 임박</option><option>계약 완료</option><option>보류</option><option>관리 불필요</option></select></div>
        <div class="edit-group"><label class="edit-label">담당자</label><select class="edit-select" id="e-manager"><option>다큐</option><option>워렌</option><option>실비아</option><option>기타</option></select></div>
      </div>

<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNnfuB6Ft357S-QsWxRROnUsx5R1gNT2csqZwYuEcwOdEx8yL4wdYeh7L04fEszaDEkg/exec";
let allData=[],filtered=[],currentIdx=null,sortKey="callDate",sortAsc=false;
let editHistory=JSON.parse(localStorage.getItem("booxtix_history")||"{}");
let currentTab="view";

async function loadData(){
  const btn=document.getElementById("refreshBtn");
  btn.classList.add("loading");btn.textContent="↻ 로딩 중...";
  document.getElementById("tableBody").innerHTML='<div class="loading-row"><span class="spinner"></span>데이터 불러오는 중...</div>';
  if(!APPS_SCRIPT_URL){setTimeout(()=>{loadDemo();btn.classList.remove("loading");btn.textContent="↻ 새로고침";setStatus(true);},700);return;}
  try{const res=await fetch(APPS_SCRIPT_URL+"?action=list");allData=(await res.json()).data||[];applyFilter();updateKpi();setStatus(true);}
  catch(e){showToast("⚠ 연결 실패 — URL을 확인해주세요");setStatus(false);document.getElementById("tableBody").innerHTML='<div class="empty"><span class="empty-icon">⚠️</span><div class="empty-title">연결 실패</div><div class="empty-desc">APPS_SCRIPT_URL을 설정해주세요.</div></div>';}
  finally{btn.classList.remove("loading");btn.textContent="↻ 새로고침";}
}

function loadDemo(){
  allData=[
    {id:"c001",name:"김부스",phone:"010-1234-5678",manager:"김성현",source:"인스타그램",region:"부산 서면",shopSize:"20평대",age:"30대",gender:"남성",callStatus:"통화 완료",callDate:"2026-04-24",callTime:"10:30",callRound:"1차",interest:"매우 높음",will:"바로 창업 희망",openTime:"즉시",budget:"충분",situation:"초보 창업자",topic:"창업비용, 가맹비",inquiry:"서면에서 직접 먹어보고 관심 생김.",answerType:"브랜드 설명, 창업비용 안내",answerMemo:"전반적인 시스템 안내 완료",nextStep:"미팅 예약",recallDate:"",recallTime:"",meetingDate:"2026-04-26",meetingRound:"1차",preContract:"",contractDate:"",finalStatus:"상담 중",holdReason:"",internalMemo:"매우 적극적. 우선 관리 필요."},
    {id:"c002",name:"박창업",phone:"010-9876-5432",manager:"이영업",source:"네이버",region:"서울 강남",shopSize:"30평대",age:"40대",gender:"여성",callStatus:"재통화 예정",callDate:"2026-04-23",callTime:"14:00",callRound:"2차",interest:"높음",will:"1개월 내 검토",openTime:"1개월 이내",budget:"적정",situation:"기존 자영업자",topic:"예상 순수익, 상권",inquiry:"현재 카페 운영 중. 전환 검토.",answerType:"수익 안내, 상권 상담",answerMemo:"상권 분석 자료 발송",nextStep:"재통화",recallDate:"2026-04-25",recallTime:"11:00",meetingDate:"",meetingRound:"",preContract:"",contractDate:"",finalStatus:"상담 중",holdReason:"",internalMemo:"강남 상권 자료 추가 준비"},
    {id:"c003",name:"이준혁",phone:"010-5555-1234",manager:"박상담",source:"홈페이지",region:"인천 송도",shopSize:"10평대",age:"20대",gender:"남성",callStatus:"부재",callDate:"2026-04-22",callTime:"",callRound:"1차",interest:"보통",will:"3개월 내 검토",openTime:"3개월 이내",budget:"미확인",situation:"초보 창업자",topic:"가맹비, 교육 방식",inquiry:"",answerType:"재통화 안내",answerMemo:"문자 발송",nextStep:"재통화",recallDate:"2026-04-26",recallTime:"",meetingDate:"",meetingRound:"",preContract:"",contractDate:"",finalStatus:"보류",holdReason:"연락 안됨",internalMemo:""},
    {id:"c004",name:"최가맹",phone:"010-3333-7777",manager:"김성현",source:"지인소개",region:"대구 수성구",shopSize:"20평대",age:"50대",gender:"남성",callStatus:"통화 완료",callDate:"2026-04-21",callTime:"16:00",callRound:"3차+",interest:"매우 높음",will:"바로 창업 희망",openTime:"즉시",budget:"충분",situation:"기존 자영업자",topic:"계약 절차, 오픈 일정",inquiry:"계약서 검토 완료. 다음 주 서명 예정.",answerType:"계약 절차 안내",answerMemo:"계약 일정 조율 중",nextStep:"계약 진행",recallDate:"",recallTime:"",meetingDate:"",meetingRound:"2차",preContract:"2026-04-20",contractDate:"",finalStatus:"계약 임박",holdReason:"",internalMemo:"계약서 준비 완료"},
    {id:"c005",name:"정영희",phone:"010-2222-8888",manager:"이영업",source:"광고",region:"부산 해운대",shopSize:"미정",age:"40대",gender:"여성",callStatus:"관심 없음",callDate:"2026-04-20",callTime:"09:00",callRound:"1차",interest:"낮음",will:"장기 검토",openTime:"미정",budget:"미확인",situation:"정보 수집 단계",topic:"창업비용",inquiry:"단순 정보 수집.",answerType:"브랜드 설명",answerMemo:"자료 이메일 발송",nextStep:"없음",recallDate:"",recallTime:"",meetingDate:"",meetingRound:"",preContract:"",contractDate:"",finalStatus:"관리 불필요",holdReason:"관심 없음",internalMemo:""},
  ];
  updateManagerFilter();applyFilter();updateKpi();
}

function updateKpi(){
  const today=new Date().toISOString().split("T")[0];
  document.getElementById("kpi-total").textContent=allData.length;
  document.getElementById("kpi-today").textContent=allData.filter(d=>d.callDate===today).length;
  document.getElementById("kpi-date").textContent=today;
  document.getElementById("kpi-hot").textContent=allData.filter(d=>d.interest==="매우 높음"||d.interest==="높음").length;
  document.getElementById("kpi-recall").textContent=allData.filter(d=>d.nextStep==="재통화"||d.callStatus==="재통화 예정").length;
}

function updateManagerFilter(){
  const sel=document.getElementById("filterManager");
  const mgrs=[...new Set(allData.map(d=>d.manager).filter(Boolean))];
  sel.innerHTML='<option value="">담당자 전체</option>'+mgrs.map(m=>`<option>${m}</option>`).join('');
}

function applyFilter(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const mgr=document.getElementById("filterManager").value;
  const interest=document.getElementById("filterInterest").value;
  const status=document.getElementById("filterStatus").value;
  filtered=allData.filter(d=>{
    if(q&&!["name","phone","region","inquiry"].some(k=>(d[k]||"").toLowerCase().includes(q)))return false;
    if(mgr&&d.manager!==mgr)return false;
    if(interest&&d.interest!==interest)return false;
    if(status&&d.callStatus!==status)return false;
    return true;
  });
  filtered.sort((a,b)=>{const va=a[sortKey]||"",vb=b[sortKey]||"";return sortAsc?va.localeCompare(vb):vb.localeCompare(va);});
  document.getElementById("filterCount").textContent=filtered.length+" 건";
  renderTable();
}

function sortBy(key){if(sortKey===key)sortAsc=!sortAsc;else{sortKey=key;sortAsc=false;}applyFilter();}

function renderTable(){
  if(!filtered.length){document.getElementById("tableBody").innerHTML='<div class="empty"><span class="empty-icon">🔍</span><div class="empty-title">검색 결과 없음</div><div class="empty-desc">조건에 맞는 상담 기록이 없습니다.</div></div>';return;}
  const sc={"통화 완료":"ok","부재":"warn","재통화 예정":"info","관심 없음":"err","문자 발송":"grey","카톡 발송":"grey"};
  const nc={"미팅 예약":"ok","계약 진행":"ok","재통화":"warn","없음":"grey","보류":"err"};
  const im={"매우 높음":"🔥","높음":"😊","보통":"🙂","낮음":"😐","단순 문의":"❔"};
  document.getElementById("tableBody").innerHTML=filtered.map((d,i)=>{
    const hasEdit=editHistory[d.id||d.name+d.phone]&&editHistory[d.id||d.name+d.phone].length>0;
    return `<div class="table-row" onclick="openPanel(${i})"><div class="td mono">${d.callDate||"—"}</div><div class="td"><strong>${d.name||"—"}</strong>${hasEdit?'<span class="edit-dot" title="수정내역 있음"></span>':''}</div><div class="td sub">${d.manager||"—"}</div><div class="td"><span class="badge ${sc[d.callStatus]||"grey"}">${d.callStatus||"—"}</span></div><div class="td">${im[d.interest]||""} ${d.interest||"—"}</div><div class="td sub">${d.region||"—"}</div><div class="td sub">${(d.topic||"").split(",")[0]||"—"}</div><div class="td"><span class="badge ${nc[d.nextStep]||"grey"}">${d.nextStep||"—"}</span></div></div>`;
  }).join('');
}

function openPanel(idx){
  currentIdx=idx;const d=filtered[idx];
  switchTab("view");renderView(d);fillEditForm(d);renderHistory(d);
  document.getElementById("panelTitle").textContent=d.name+" · "+(d.phone||"");
  document.getElementById("panelBadge").innerHTML=d.interest?`<span class="badge grey">${d.interest}</span>`:"";
  document.getElementById("panelOverlay").classList.add("show");
  document.getElementById("detailPanel").classList.add("show");
}

function closePanel(){document.getElementById("panelOverlay").classList.remove("show");document.getElementById("detailPanel").classList.remove("show");currentIdx=null;}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".panel-tab").forEach((t,i)=>t.classList.toggle("active",["view","edit","history"][i]===tab));
  document.querySelectorAll(".panel-view").forEach(v=>v.classList.remove("active"));
  document.getElementById(tab+"Tab").classList.add("active");
  document.getElementById("editActions").style.display=tab==="edit"?"flex":"none";
}

function renderView(d){
  const f=(label,val)=>val?`<div class="panel-field"><div class="panel-label">${label}</div><div class="panel-value">${val}</div></div>`:'';
  document.getElementById("panelBody").innerHTML=`
    <div class="panel-section"><div class="panel-section-title">고객 정보</div><div class="panel-grid">${f("이름",d.name)}${f("연락처",d.phone)}${f("담당자",d.manager)}${f("유입경로",d.source)}${f("지역",d.region)}${f("점포규모",d.shopSize)}${f("연령대",d.age)}${f("성별",d.gender)}</div></div>
    <div class="panel-section"><div class="panel-section-title">통화 정보</div><div class="panel-grid">${f("통화 상태",d.callStatus)}${f("통화 일시",(d.callDate||"")+" "+(d.callTime||""))}${f("통화 횟수",d.callRound)}${f("관심도",d.interest)}${f("창업 의지",d.will)}${f("오픈 시점",d.openTime)}${f("창업비용 상태",d.budget)}</div></div>
    ${d.situation||d.topic?`<div class="panel-section"><div class="panel-section-title">상담 내용</div><div class="panel-grid">${f("현재 상황",d.situation)}${f("문의 주제",d.topic)}${f("답변 유형",d.answerType)}</div>${d.inquiry?`<div class="panel-label" style="margin-top:12px;margin-bottom:6px">상세 문의</div><div class="memo-box">${d.inquiry}</div>`:""}${d.answerMemo?`<div class="panel-label" style="margin-top:10px;margin-bottom:6px">답변 메모</div><div class="memo-box">${d.answerMemo}</div>`:""}</div>`:""}
    <div class="panel-section"><div class="panel-section-title">다음 단계</div><div class="next-step-box"><div class="next-step-label">NEXT ACTION</div><div class="next-step-value">${d.nextStep||"미정"}</div>${d.recallDate?`<div class="next-step-date">📞 재통화 ${d.recallDate} ${d.recallTime||""}</div>`:""}${d.meetingDate?`<div class="next-step-date">🤝 미팅 ${d.meetingDate} (${d.meetingRound||""})</div>`:""}</div><div class="panel-grid" style="margin-top:12px">${f("최종 상태",d.finalStatus)}${f("보류 사유",d.holdReason)}</div>${d.internalMemo?`<div class="panel-label" style="margin-top:10px;margin-bottom:6px">내부 메모</div><div class="memo-box">${d.internalMemo}</div>`:""}</div>`;
}

const EDITABLE_FIELDS=["callStatus","recallDate","recallTime","interest","nextStep","meetingDate","meetingRound","finalStatus","manager","holdReason","answerMemo","internalMemo"];

function fillEditForm(d){
  EDITABLE_FIELDS.forEach(k=>{const el=document.getElementById("e-"+k);if(el)el.value=d[k]||"";});
  document.querySelectorAll("#e-interest-chips .edit-chip").forEach(c=>c.classList.toggle("active",c.dataset.val===d.interest));
}

function selectChip(el,targetId){el.closest(".edit-chip-group").querySelectorAll(".edit-chip").forEach(c=>c.classList.remove("active"));el.classList.add("active");document.getElementById(targetId).value=el.dataset.val;}

function cancelEdit(){switchTab("view");}

async function saveEdit(){
  const d=filtered[currentIdx];const id=d.id||(d.name+d.phone);const changes=[];
  const timeStr=new Date().toLocaleString("ko-KR");
  EDITABLE_FIELDS.forEach(k=>{
    const el=document.getElementById("e-"+k);if(!el)return;
    const newVal=el.value.trim();const oldVal=(d[k]||"").trim();
    if(newVal!==oldVal){changes.push({field:fieldLabel(k),old:oldVal||"없음",new:newVal||"없음"});d[k]=newVal;}
  });
  if(!changes.length){showToast("변경된 내용이 없습니다.");return;}
  if(!editHistory[id])editHistory[id]=[];
  editHistory[id].unshift({time:timeStr,editor:"관리자",changes});
  localStorage.setItem("booxtix_history",JSON.stringify(editHistory));
  if(APPS_SCRIPT_URL){try{const fd=new FormData();fd.append("action","update");fd.append("data",JSON.stringify({id,updates:EDITABLE_FIELDS.reduce((acc,k)=>({...acc,[k]:d[k]}),{})}));await fetch(APPS_SCRIPT_URL,{method:"POST",body:fd});}catch(e){showToast("⚠ 서버 저장 실패 (로컬만 저장됨)");}}
  renderView(d);renderHistory(d);renderTable();switchTab("view");
  showToast("✓ "+changes.length+"개 항목이 저장되었습니다.");
}

function fieldLabel(k){const map={callStatus:"통화상태",recallDate:"재통화날짜",recallTime:"재통화시간",interest:"관심도",nextStep:"다음단계",meetingDate:"미팅날짜",meetingRound:"미팅회차",finalStatus:"최종상태",manager:"담당자",holdReason:"보류사유",answerMemo:"답변메모",internalMemo:"내부메모"};return map[k]||k;}

function renderHistory(d){
  const id=d.id||(d.name+d.phone);const hist=editHistory[id]||[];
  document.getElementById("historyCount").textContent=hist.length?` (${hist.length})`:"";
  if(!hist.length){document.getElementById("historyBody").innerHTML='<div class="history-empty">수정 내역이 없습니다.</div>';return;}
  document.getElementById("historyBody").innerHTML=hist.map(h=>`<div class="history-item"><div class="history-meta"><span class="history-time">${h.time}</span><span class="history-editor">${h.editor}</span></div><div class="history-changes">${h.changes.map(c=>`<div class="history-change"><span class="field-name">${c.field}</span> <span class="old-val">${c.old}</span>→ <span class="new-val">${c.new}</span></div>`).join("")}</div></div>`).join('');
}

function setStatus(ok){document.getElementById("statusDot").style.background=ok?"#2D7A55":"#E05252";document.getElementById("statusText").textContent=ok?"연결됨":"오프라인";}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);}

loadData();
</script>
</body>
</html>
