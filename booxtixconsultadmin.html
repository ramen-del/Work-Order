<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOXTIX · 상담 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--text:#1A1A1A;--sub:#888;--border:#E8E8E4;--soft:#F5F5F3;--ok:#2D7A55;--err:#E05252;--warn:#D97706;--info:#1565C0;--radius:14px}
html,body{min-height:100vh;background:#F7F7F5;font-family:"Noto Sans KR",sans-serif;color:var(--text)}
.nav{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
.logo{font-family:"DM Mono",monospace;font-size:13px;font-weight:700;letter-spacing:.16em}.logo span{color:#aaa;font-weight:400;margin-left:10px;letter-spacing:.12em}
.nav-right{display:flex;align-items:center;gap:10px}.status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--sub)}.dot{width:7px;height:7px;border-radius:50%;background:#bbb}.dot.ok{background:var(--ok)}.dot.err{background:var(--err)}
.btn{border:1px solid var(--border);background:#fff;border-radius:10px;padding:10px 14px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}.btn:hover{background:var(--soft)}.btn.dark{background:var(--text);color:#fff;border-color:var(--text)}.btn:disabled{opacity:.5;pointer-events:none}
.main{max-width:1220px;margin:0 auto;padding:32px 24px}.eyebrow{font-family:"DM Mono",monospace;font-size:12px;color:#aaa;letter-spacing:.18em;margin-bottom:8px}.title{font-size:28px;letter-spacing:-.04em;font-weight:900;margin-bottom:8px}.desc{font-size:14px;color:#666;margin-bottom:24px;line-height:1.6}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}.kpi{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px}.kpi-label{font-size:12px;color:#777;font-weight:800;margin-bottom:7px}.kpi-value{font-size:30px;font-weight:900;line-height:1}.kpi-sub{font-size:12px;color:#888;margin-top:8px}
.filter-bar{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px;display:flex;gap:10px;align-items:center}.search{flex:1;position:relative}.search input{width:100%;padding:13px 14px 13px 38px;border:1px solid var(--border);border-radius:12px;font-family:inherit;font-size:14px;outline:none}.search span{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#aaa}.select{padding:12px 36px 12px 14px;border:1px solid var(--border);border-radius:12px;background:#fff;font-family:inherit;font-size:14px}.count{font-size:13px;color:#888;white-space:nowrap}
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}.table-head,.table-row{display:grid;grid-template-columns:110px 80px 120px 130px 90px 130px 1fr 110px 120px 80px;gap:10px;align-items:center}.table-head{padding:13px 16px;border-bottom:1px solid var(--border);background:#fbfbfa}.th{font-size:11px;color:#777;font-weight:900;cursor:pointer}.table-body{max-height:calc(100vh - 430px);overflow:auto}.table-row{padding:14px 16px;border-bottom:1px solid #F0F0EE;cursor:pointer}.table-row:hover{background:#FAFAF9}.td{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.td.sub{color:#777}.mono{font-family:"DM Mono",monospace;font-size:12px}.badge{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:800}.badge.ok{background:#E8F5EE;color:var(--ok)}.badge.warn{background:#FEF3C7;color:var(--warn)}.badge.err{background:#FEE2E2;color:var(--err)}.badge.grey{background:#F0F0EE;color:#666}.badge.info{background:#DBEAFE;color:var(--info)}
.empty{padding:70px 20px;text-align:center;color:#888}.empty-icon{font-size:38px;margin-bottom:10px}.loading{padding:44px;text-align:center;color:#888}.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}@keyframes spin{to{transform:rotate(360deg)}}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:200}.overlay.show{display:block}.panel{position:fixed;right:0;top:0;bottom:0;width:620px;background:#fff;z-index:201;transform:translateX(100%);transition:.25s;display:flex;flex-direction:column;border-left:1px solid var(--border)}.panel.show{transform:translateX(0)}.panel-head{height:64px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);padding:0 18px}.close{width:34px;height:34px;border:1px solid var(--border);border-radius:10px;background:#fff;cursor:pointer}.panel-title{font-size:16px;font-weight:900;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tabs{display:flex;border-bottom:1px solid var(--border)}.tab{flex:1;text-align:center;padding:14px;font-weight:800;color:#888;cursor:pointer;border-bottom:2px solid transparent}.tab.active{color:#111;border-bottom-color:#111}.panel-content{flex:1;overflow:auto}.view{display:none;padding:20px}.view.active{display:block}.section{margin-bottom:22px}.section-title{font-size:12px;font-weight:900;color:#777;padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:flex;flex-direction:column;gap:4px}.label{font-size:11px;color:#888;font-weight:900}.value{font-size:14px;line-height:1.5}.memo{background:var(--soft);border-radius:12px;padding:14px;font-size:14px;line-height:1.7;white-space:pre-wrap}.next-box{background:#1A1A1A;color:#fff;border-radius:14px;padding:16px;margin-bottom:14px}.next-label{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,.55);margin-bottom:6px}.next-value{font-size:18px;font-weight:900}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.group{margin-bottom:14px}.input,.textarea,.form-select{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:12px 13px;font-family:inherit;font-size:14px;background:#fff;outline:none}.textarea{min-height:88px;resize:vertical;line-height:1.6}.input:focus,.textarea:focus,.form-select:focus{border-color:#111}.filebox{border:2px dashed var(--border);border-radius:14px;padding:20px;text-align:center;background:#fafafa;cursor:pointer}.file-list{margin-top:8px}.file-item{padding:9px 11px;border:1px solid var(--border);border-radius:10px;margin-top:6px;display:flex;justify-content:space-between;gap:8px;font-size:13px}.actions{display:none;border-top:1px solid var(--border);padding:16px 18px;gap:10px}.actions.show{display:flex}.history-item{padding:13px 0;border-bottom:1px solid var(--border)}.history-time{font-size:12px;color:#888;margin-bottom:6px}.history-change{font-size:13px;background:#fafafa;border-radius:10px;padding:9px;margin-bottom:5px}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#111;color:#fff;border-radius:999px;padding:12px 20px;font-size:14px;font-weight:700;opacity:0;pointer-events:none;transition:.2s;z-index:999}.toast.show{opacity:1}
@media(max-width:900px){.kpi-row{grid-template-columns:1fr 1fr}.filter-bar{flex-direction:column;align-items:stretch}.table-head,.table-row{grid-template-columns:100px 90px 1fr 90px}.th:nth-child(n+5),.td:nth-child(n+5){display:none}.panel{width:100%}}
</style>
</head>
<body>
<div class="nav"><div class="logo">BOOXTIX <span>· 상담 관리자</span></div><div class="nav-right"><div class="status"><i class="dot" id="statusDot"></i><span id="statusText">연결 중</span></div><button class="btn" id="refreshBtn" onclick="loadData()">↻ 새로고침</button></div></div>
<div class="main">
  <div class="eyebrow">CRM FLOW</div><div class="title">1차 접수 → 1차 상담 완료 → 다음액션</div><div class="desc">원본 Apps Script 엔진의 <b>action=list</b> 데이터를 그대로 읽고, 관리자 저장은 <b>action=update</b>로만 전송합니다.</div>
  <div class="kpi-row"><div class="kpi"><div class="kpi-label">전체 문의</div><div class="kpi-value" id="kpiTotal">0</div><div class="kpi-sub">등록된 리드</div></div><div class="kpi"><div class="kpi-label">오늘 접수</div><div class="kpi-value" id="kpiToday">0</div><div class="kpi-sub" id="todayText">-</div></div><div class="kpi"><div class="kpi-label">1차 상담 대기</div><div class="kpi-value" id="kpiPending">0</div><div class="kpi-sub">미작성 리드</div></div><div class="kpi"><div class="kpi-label">다음액션 필요</div><div class="kpi-value" id="kpiNext">0</div><div class="kpi-sub">완료 후 후속관리</div></div></div>
  <div class="filter-bar"><div class="search"><span>⌕</span><input id="searchInput" placeholder="이름, 연락처, 지역, 문의내용 검색" oninput="applyFilter()"></div><select class="select" id="stageFilter" onchange="applyFilter()"><option value="">단계 전체</option><option>미작성</option><option>1차 상담 완료</option></select><select class="select" id="nextFilter" onchange="applyFilter()"><option value="">다음액션 전체</option><option>상담 대기</option><option>재통화</option><option>미팅잡기</option><option>자료발송</option><option>내부검토</option><option>상권확인</option><option>가계약</option><option>계약진행</option><option>보류</option><option>종료</option></select><select class="select" id="sourceFilter" onchange="applyFilter()"><option value="">유입 전체</option></select><select class="select" id="sortSelect" onchange="applySort()"><option value="new">문의일 최신순</option><option value="old">문의일 오래된순</option></select><div class="count" id="countText">0 건</div></div>
  <div class="table-wrap"><div class="table-head"><div class="th">문의일자</div><div class="th">시간</div><div class="th">이름</div><div class="th">연락처</div><div class="th">점포</div><div class="th">희망지역</div><div class="th">유입경로</div><div class="th">단계</div><div class="th">다음액션</div><div class="th">수정</div></div><div class="table-body" id="tableBody"><div class="loading"><span class="spinner"></span>데이터 불러오는 중...</div></div></div>
</div>
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-head"><button class="close" onclick="closePanel()">×</button><div class="panel-title" id="panelTitle">상담 상세</div><div id="panelBadge"></div></div>
  <div class="tabs"><div class="tab active" onclick="switchTab('base')">기본</div><div class="tab" onclick="switchTab('consult')">상담</div><div class="tab" onclick="switchTab('history')">수정내역 <span id="histCount"></span></div></div>
  <div class="panel-content"><div class="view active" id="baseTab"></div><div class="view" id="consultTab"></div><div class="view" id="historyTab"></div></div>
  <div class="actions" id="actions"><button class="btn" onclick="fillConsultForm(currentRecord)">되돌리기</button><button class="btn dark" id="saveBtn" onclick="saveConsult()">상담/다음액션 저장</button></div>
</div>
<div class="toast" id="toast"></div>
<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8AkKjfDUzGZzKEHv7XY2vUJyDdcar6sLR5bjpJB5rKd-hqZ4JxISttYdn8OB6xscr8g/exec";
let allData=[], filtered=[], currentRecord=null;
let editHistory=JSON.parse(localStorage.getItem("booxtix_admin_history")||"{}");
let pendingFiles=[];
const NEXT_STEPS=["상담 대기","재통화","미팅잡기","자료발송","내부검토","상권확인","가계약","계약진행","보류","종료"];
const FINAL_STATUS=["신규 문의","상담 중","1차 상담 완료","재통화 필요","미팅 예정","자료 발송 완료","내부 검토 중","상권 확인 중","가계약","계약 진행","계약 완료","보류","종료"];
const CALL_STATUS=["","통화 완료","부재","문자 발송","카톡 발송","재통화 예정","관심 없음"];
const WORK_TYPES=["","1차 상담","재상담","미팅 전","미팅 후","계약 전","보류 관리"];
const CURRENT_SITUATIONS=["","매장 있음","매장 알아보는 중","업종 변경 희망","기존 자영업자","초보 창업자","가족 운영","배달 전문","홀/배달 병행","확인 필요"];
const TOPICS=["","창업비용","가맹비","수익률","상권","점포 조건","배달 운영","교육 방식","계약 절차","오픈 일정","기타"];
const ANSWER_TYPES=["","통화 답변","문자 답변","카톡 답변","자료 발송","내부 확인 후 답변","미응답"];
function todayStr(){return new Date().toISOString().slice(0,10)}
function clean(v){return v===null||v===undefined?"":String(v).trim()}
function isBadTime(v){v=clean(v);return !v||v==="1899-12-31"||v.startsWith("1899-")||v==="--:--"}
function safeTime(v){return isBadTime(v)?"":clean(v)}
function val(o,...keys){for(const k of keys){if(o&&o[k]!==undefined&&o[k]!==null&&String(o[k]).trim()!=="")return o[k]}return ""}
function normalizeRecord(raw){
  const r={...raw};
  r.id=clean(val(raw,"id","consultId","상담번호"));
  r.submittedAt=clean(val(raw,"submittedAt","제출일시"));
  r.inquiryDate=clean(val(raw,"inquiryDate","문의일자","callDate","날짜"));
  r.inquiryTime=safeTime(val(raw,"inquiryTime","문의시간","callTime","시간"));
  r.name=clean(val(raw,"name","이름"));
  r.phone=clean(val(raw,"phone","연락처"));
  r.hasStore=clean(val(raw,"hasStore","점포유무","점포 유/무"));
  r.desiredRegion=clean(val(raw,"desiredRegion","창업희망지역","창업 희망지역","region","지역"));
  r.source=clean(val(raw,"source","유입경로"));
  r.sourceEtc=clean(val(raw,"sourceEtc","기타유입경로","기타 유입경로"));
  r.note=clean(val(raw,"note","비고"));
  r.firstConsultStatus=clean(val(raw,"firstConsultStatus","1차상담상태","1차 상담 상태"))||"미작성";
  r.callStatus=clean(val(raw,"callStatus","상담상태","통화상태"));
  r.workType=clean(val(raw,"workType","작업형태"));
  r.currentSituation=clean(val(raw,"currentSituation","현재상황","현재 상황","situation"));
  r.inquiryTopic=clean(val(raw,"inquiryTopic","문의주제","문의 주제","topic"));
  r.detailInquiryMemo=clean(val(raw,"detailInquiryMemo","상세문의메모","상세문의 메모","상세 문의 메모","inquiry"));
  r.answerType=clean(val(raw,"answerType","답변유형","답변 유형"));
  r.answerMemo=clean(val(raw,"answerMemo","답변메모","답변 메모"));
  r.nextStep=clean(val(raw,"nextStep","다음단계","다음 단계"))||"상담 대기";
  r.nextActionDetail=clean(val(raw,"nextActionDetail","다음단계상세","다음단계 상세","다음단계 상세내용","다음액션 상세"));
  r.nextActionDate=clean(val(raw,"nextActionDate","다음액션예정일","다음액션 예정일"));
  r.nextActionTime=safeTime(val(raw,"nextActionTime","다음액션예정시간","다음액션 예정시간"));
  r.nextActionOwner=clean(val(raw,"nextActionOwner","담당자","manager"));
  r.nextActionMemo=clean(val(raw,"nextActionMemo","내부메모","내부 메모","internalMemo"));
  r.finalStatus=clean(val(raw,"finalStatus","최종상태","최종 상태"))||"신규 문의";
  r.recordLinks=clean(val(raw,"recordLinks","녹음링크"));
  r.htmlUrl=clean(val(raw,"htmlUrl","HTML보기"));
  r.folderUrl=clean(val(raw,"folderUrl","폴더링크"));
  r.editCount=clean(val(raw,"editCount","수정횟수"));
  return r;
}
async function loadData(){
  const btn=document.getElementById("refreshBtn");btn.disabled=true;btn.textContent="↻ 로딩 중";document.getElementById("tableBody").innerHTML='<div class="loading"><span class="spinner"></span>데이터 불러오는 중...</div>';
  try{
    const url=APPS_SCRIPT_URL+"?action=list&_="+Date.now();
    const res=await fetch(url,{cache:"no-store"});
    const json=await res.json();
    const list=Array.isArray(json.data)?json.data:(Array.isArray(json.records)?json.records:(Array.isArray(json.rows)?json.rows:[]));
    allData=list.map(normalizeRecord);
    setStatus(true);updateSourceFilter();applyFilter();
  }catch(e){console.error(e);setStatus(false);document.getElementById("tableBody").innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><b>관리자 연결 실패</b><br>현재 Apps Script URL의 action=list 응답을 확인해야 합니다.</div>';showToast("관리자 연결 실패");}
  finally{btn.disabled=false;btn.textContent="↻ 새로고침"}
}
function updateSourceFilter(){const sel=document.getElementById("sourceFilter");const cur=sel.value;const src=[...new Set(allData.map(d=>d.source).filter(Boolean))];sel.innerHTML='<option value="">유입 전체</option>'+src.map(s=>`<option>${esc(s)}</option>`).join('');sel.value=cur;}
function applyFilter(){const q=clean(document.getElementById("searchInput").value).toLowerCase();const st=document.getElementById("stageFilter").value;const ns=document.getElementById("nextFilter").value;const so=document.getElementById("sourceFilter").value;filtered=allData.filter(d=>{const hay=[d.id,d.name,d.phone,d.desiredRegion,d.source,d.note,d.detailInquiryMemo,d.answerMemo,d.nextActionDetail].join(" ").toLowerCase();if(q&&!hay.includes(q))return false;if(st&&d.firstConsultStatus!==st)return false;if(ns&&d.nextStep!==ns)return false;if(so&&d.source!==so)return false;return true;});applySort(false);updateKpi();renderTable();}
function applySort(render=true){const mode=document.getElementById("sortSelect").value;filtered.sort((a,b)=>{const av=(a.inquiryDate||a.submittedAt||"")+(a.inquiryTime||"");const bv=(b.inquiryDate||b.submittedAt||"")+(b.inquiryTime||"");return mode==="old"?av.localeCompare(bv):bv.localeCompare(av);});if(render)renderTable();}
function updateKpi(){document.getElementById("kpiTotal").textContent=allData.length;document.getElementById("kpiToday").textContent=allData.filter(d=>d.inquiryDate===todayStr()).length;document.getElementById("todayText").textContent=todayStr();document.getElementById("kpiPending").textContent=allData.filter(d=>(d.firstConsultStatus||"미작성")==="미작성").length;document.getElementById("kpiNext").textContent=allData.filter(d=>(d.firstConsultStatus)==="1차 상담 완료" && (d.nextStep||"상담 대기")!=="종료").length;document.getElementById("countText").textContent=filtered.length+" 건";}
function renderTable(){if(!filtered.length){document.getElementById("tableBody").innerHTML='<div class="empty"><div class="empty-icon">🔎</div><b>검색 결과 없음</b><br>조건에 맞는 문의가 없습니다.</div>';return;}document.getElementById("tableBody").innerHTML=filtered.map((d,i)=>`<div class="table-row" onclick="openPanel(${i})"><div class="td mono">${esc(d.inquiryDate)||"-"}</div><div class="td mono">${esc(d.inquiryTime)||"-"}</div><div class="td"><b>${esc(d.name)||"-"}</b></div><div class="td sub">${esc(d.phone)||"-"}</div><div class="td">${badge(d.hasStore||"-","grey")}</div><div class="td sub">${esc(d.desiredRegion)||"-"}</div><div class="td sub">${esc(d.source)||"-"}</div><div class="td">${badge(d.firstConsultStatus,d.firstConsultStatus==="1차 상담 완료"?"ok":"warn")}</div><div class="td">${badge(d.nextStep,d.nextStep==="보류"||d.nextStep==="종료"?"err":(d.nextStep==="상담 대기"?"warn":"grey"))}</div><div class="td sub">${esc(d.editCount)||"-"}</div></div>`).join('');}
function badge(t,c){return `<span class="badge ${c||"grey"}">${esc(t||"-")}</span>`}
function openPanel(i){currentRecord=filtered[i];pendingFiles=[];renderBase(currentRecord);renderConsult(currentRecord);renderHistory(currentRecord);document.getElementById("panelTitle").textContent=(currentRecord.name||"-")+" · "+(currentRecord.phone||"");document.getElementById("panelBadge").innerHTML=badge(currentRecord.firstConsultStatus,currentRecord.firstConsultStatus==="1차 상담 완료"?"ok":"warn");switchTab('base');document.getElementById("overlay").classList.add("show");document.getElementById("panel").classList.add("show");}
function closePanel(){document.getElementById("overlay").classList.remove("show");document.getElementById("panel").classList.remove("show");currentRecord=null;}
function switchTab(tab){document.querySelectorAll(".tab").forEach((el,idx)=>el.classList.toggle("active",["base","consult","history"][idx]===tab));document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));document.getElementById(tab+"Tab").classList.add("active");document.getElementById("actions").classList.toggle("show",tab==="consult");}
function field(label,value){return `<div class="field"><div class="label">${label}</div><div class="value">${esc(value)||"-"}</div></div>`}
function renderBase(d){document.getElementById("baseTab").innerHTML=`<div class="section"><div class="section-title">1차 접수 기본정보</div><div class="grid">${field("상담번호",d.id)}${field("제출일시",d.submittedAt)}${field("문의일자",d.inquiryDate)}${field("문의시간",d.inquiryTime)}${field("이름",d.name)}${field("연락처",d.phone)}${field("점포 유/무",d.hasStore)}${field("창업 희망지역",d.desiredRegion)}${field("유입경로",d.source)}${field("기타 유입경로",d.sourceEtc)}</div><div style="margin-top:14px"><div class="label">비고</div><div class="memo">${esc(d.note)||"-"}</div></div>${d.folderUrl?`<div style="margin-top:14px"><a class="btn" href="${escAttr(d.folderUrl)}" target="_blank">고객 폴더 열기</a> ${d.htmlUrl?`<a class="btn" href="${escAttr(d.htmlUrl)}" target="_blank">상담기록 HTML 열기</a>`:""}</div>`:""}</div><div class="section"><div class="section-title">상담 탭 작성 내용 반영</div><div class="grid">${field("1차 상담 상태",d.firstConsultStatus)}${field("상담상태",d.callStatus)}${field("작업형태",d.workType)}${field("현재상황",d.currentSituation)}${field("문의주제",d.inquiryTopic)}${field("답변유형",d.answerType)}${field("다음단계",d.nextStep)}${field("최종상태",d.finalStatus)}${field("담당자",d.nextActionOwner)}</div></div>`;}
function renderConsult(d){document.getElementById("consultTab").innerHTML=`<div class="section"><div class="section-title">1차 상담 작성 / 수정</div><div class="form-grid"><div class="group"><div class="label">상담상태</div>${selectHtml("f-callStatus",CALL_STATUS,d.callStatus)}</div><div class="group"><div class="label">작업형태</div>${selectHtml("f-workType",WORK_TYPES,d.workType)}</div></div><div class="group"><div class="label">통화녹음 업로드</div><label class="filebox" for="recordInput">🎙️ 파일 선택<br><span style="font-size:12px;color:#888">mp3, m4a, wav / 저장 시 고객 폴더에 업로드</span></label><input id="recordInput" type="file" accept="audio/*,.mp3,.m4a,.wav" multiple hidden onchange="handleFiles(this.files)"><div class="file-list" id="fileList"></div>${recordLinksHtml(d.recordLinks)}</div><div class="form-grid"><div class="group"><div class="label">현재상황</div>${selectHtml("f-currentSituation",CURRENT_SITUATIONS,d.currentSituation)}</div><div class="group"><div class="label">문의주제</div>${selectHtml("f-inquiryTopic",TOPICS,d.inquiryTopic)}</div></div><div class="group"><div class="label">상세문의 메모</div><textarea class="textarea" id="f-detailInquiryMemo" placeholder="고객이 실제로 물어본 내용을 정리">${esc(d.detailInquiryMemo)}</textarea></div><div class="group"><div class="label">답변유형</div>${selectHtml("f-answerType",ANSWER_TYPES,d.answerType)}</div><div class="group"><div class="label">답변메모</div><textarea class="textarea" id="f-answerMemo" placeholder="어떤 답변을 했는지 기록">${esc(d.answerMemo)}</textarea></div></div><div class="section"><div class="section-title">다음액션 작성</div><div class="next-box"><div class="next-label">NEXT ACTION</div><div class="next-value" id="nextPreview">${esc(d.nextStep)||"상담 대기"}</div></div><div class="form-grid"><div class="group"><div class="label">다음단계</div>${selectHtml("f-nextStep",NEXT_STEPS,d.nextStep||"상담 대기",true)}</div><div class="group"><div class="label">최종상태</div>${selectHtml("f-finalStatus",FINAL_STATUS,d.finalStatus||"신규 문의")}</div><div class="group"><div class="label">다음액션 예정일</div><input class="input" type="date" id="f-nextActionDate" value="${escAttr(d.nextActionDate)}"></div><div class="group"><div class="label">다음액션 예정시간</div><input class="input" type="time" id="f-nextActionTime" value="${escAttr(d.nextActionTime)}"></div><div class="group"><div class="label">담당자</div><input class="input" id="f-nextActionOwner" value="${escAttr(d.nextActionOwner)}" placeholder="담당자명"></div></div><div class="group"><div class="label">다음단계 상세내용</div><textarea class="textarea" id="f-nextActionDetail" placeholder="예: 4월 30일 오후 2시에 재통화, 창업비용표 카톡 발송 등">${esc(d.nextActionDetail)}</textarea></div><div class="group"><div class="label">내부 메모</div><textarea class="textarea" id="f-nextActionMemo" placeholder="내부에서 공유할 후속 메모">${esc(d.nextActionMemo)}</textarea></div></div>`;document.getElementById("f-nextStep").addEventListener("change",e=>document.getElementById("nextPreview").textContent=e.target.value||"상담 대기");}
function selectHtml(id,arr,value){return `<select class="form-select" id="${id}">${arr.map(v=>`<option value="${escAttr(v)}" ${v===value?"selected":""}>${esc(v||"선택")}</option>`).join('')}</select>`}
function recordLinksHtml(str){const links=clean(str).split(/\n|,/).map(s=>s.trim()).filter(Boolean);if(!links.length)return '<div style="font-size:12px;color:#999;margin-top:8px">기존 녹음 없음</div>';return '<div style="margin-top:10px">'+links.map((u,i)=>`<a class="file-item" href="${escAttr(u)}" target="_blank"><span>🎵 기존 녹음 ${i+1}</span><span>열기</span></a>`).join('')+'</div>';}
function handleFiles(files){pendingFiles=[...pendingFiles,...Array.from(files)];renderFileList();}
function renderFileList(){const box=document.getElementById("fileList");box.innerHTML=pendingFiles.map((f,i)=>`<div class="file-item"><span>🎵 ${esc(f.name)}</span><button class="btn" onclick="removeFile(${i})" type="button">삭제</button></div>`).join('');}
function removeFile(i){pendingFiles.splice(i,1);renderFileList();}
function readFileAsDataURL(file){return new Promise((resolve,reject)=>{const fr=new FileReader();fr.onload=()=>resolve({name:file.name,type:file.type,src:fr.result});fr.onerror=reject;fr.readAsDataURL(file);});}
function getUpdates(){return {firstConsultStatus:"1차 상담 완료",callStatus:gv("f-callStatus"),workType:gv("f-workType"),currentSituation:gv("f-currentSituation"),inquiryTopic:gv("f-inquiryTopic"),detailInquiryMemo:gv("f-detailInquiryMemo"),answerType:gv("f-answerType"),answerMemo:gv("f-answerMemo"),nextStep:gv("f-nextStep"),finalStatus:gv("f-finalStatus"),nextActionDate:gv("f-nextActionDate"),nextActionTime:gv("f-nextActionTime"),nextActionOwner:gv("f-nextActionOwner"),nextActionDetail:gv("f-nextActionDetail"),nextActionMemo:gv("f-nextActionMemo")};}
function gv(id){const el=document.getElementById(id);return el?el.value.trim():""}
async function saveConsult(){if(!currentRecord)return;const save=document.getElementById("saveBtn");save.disabled=true;save.textContent="저장 중...";const updates=getUpdates();const changes=[];Object.keys(updates).forEach(k=>{if(clean(currentRecord[k])!==clean(updates[k]))changes.push({field:k,old:clean(currentRecord[k])||"없음",new:clean(updates[k])||"없음"})});try{const newRecords=await Promise.all(pendingFiles.map(readFileAsDataURL));const fd=new FormData();fd.append("data",JSON.stringify({id:currentRecord.id,updates,newRecords}));const res=await fetch(APPS_SCRIPT_URL+"?action=update&_="+Date.now(),{method:"POST",body:fd});const json=await res.json();if(json.result!=="success")throw new Error(json.message||"저장 실패");if(changes.length){const key=currentRecord.id;editHistory[key]=editHistory[key]||[];editHistory[key].unshift({time:new Date().toLocaleString("ko-KR"),changes});localStorage.setItem("booxtix_admin_history",JSON.stringify(editHistory));}showToast("저장 완료");pendingFiles=[];await loadData();const fresh=allData.find(x=>x.id===currentRecord.id);if(fresh){currentRecord=fresh;renderBase(fresh);renderConsult(fresh);renderHistory(fresh);document.getElementById("panelBadge").innerHTML=badge(fresh.firstConsultStatus,"ok");}}catch(e){console.error(e);showToast("저장 실패: "+e.message);}finally{save.disabled=false;save.textContent="상담/다음액션 저장";}}
function fillConsultForm(d){renderConsult(d);pendingFiles=[];showToast("되돌렸습니다")}
function renderHistory(d){const hist=editHistory[d.id]||[];document.getElementById("histCount").textContent=hist.length?`(${hist.length})`:"";document.getElementById("historyTab").innerHTML=hist.length?hist.map(h=>`<div class="history-item"><div class="history-time">${esc(h.time)}</div>${h.changes.map(c=>`<div class="history-change"><b>${esc(labelOf(c.field))}</b>: ${esc(c.old)} → ${esc(c.new)}</div>`).join('')}</div>`).join(''):'<div class="empty"><div class="empty-icon">🕒</div>이 브라우저에 저장된 수정내역이 없습니다.</div>';}
function labelOf(k){return {firstConsultStatus:"1차상담상태",callStatus:"상담상태",workType:"작업형태",currentSituation:"현재상황",inquiryTopic:"문의주제",detailInquiryMemo:"상세문의메모",answerType:"답변유형",answerMemo:"답변메모",nextStep:"다음단계",finalStatus:"최종상태",nextActionDate:"다음액션예정일",nextActionTime:"다음액션예정시간",nextActionOwner:"담당자",nextActionDetail:"다음단계상세",nextActionMemo:"내부메모"}[k]||k}
function setStatus(ok){document.getElementById("statusDot").className="dot "+(ok?"ok":"err");document.getElementById("statusText").textContent=ok?"연결됨":"오류"}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500)}
function esc(v){return clean(v).replace(/[&<>'"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[m]))}
function escAttr(v){return esc(v)}
loadData();
</script>
</body>
</html>
