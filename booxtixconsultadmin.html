<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOSTIX · 가맹상담 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --text:#1A1A1A;
  --sub:#999;
  --border:#E8E8E4;
  --soft:#F5F5F3;
  --soft2:#FAFAF9;
  --ok:#2D7A55;
  --err:#E05252;
  --warn:#D97706;
  --info:#1565C0;
  --radius:12px;
}
html,body{
  min-height:100vh;
  background:#F7F7F5;
  font-family:"Noto Sans KR",sans-serif;
  color:var(--text);
}
button,input,select,textarea{
  font-family:inherit;
}
.nav{
  height:70px;
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:0 20px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:sticky;
  top:0;
  z-index:100;
}
.nav-logo{
  font-size:22px;
  font-weight:900;
  letter-spacing:-.035em;
  color:#333;
}
.sub-header{
  height:46px;
  background:#fff;
  padding:0 20px;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:70px;
  z-index:99;
  display:flex;
  align-items:center;
}
.sub-header-inner{
  max-width:none;
  width:100%;
  margin:0 auto;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
}
.page-label{
  font-family:"DM Mono",monospace;
  font-size:13px;
  letter-spacing:.28em;
  color:var(--sub);
  font-weight:400;
}
.page-label b{
  color:var(--text);
  font-weight:700;
}
.sub-header-right{
  position:absolute;
  right:0;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  align-items:center;
  gap:10px;
}
.status-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#2D7A55;
}
.status-text{
  font-size:13px;
  color:var(--sub);
}
.refresh-btn{
  height:38px;
  padding:0 18px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  transition:.15s;
}
.refresh-btn:hover{
  background:var(--soft);
}
.refresh-btn.loading{
  opacity:.6;
  pointer-events:none;
}
.main{
  max-width:100%;
  margin:0;
  padding:36px 34px 60px;
}
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  margin-bottom:30px;
}
.kpi{
  background:#fff;
  border-radius:14px;
  border:1px solid var(--border);
  padding:28px 30px;
  min-height:124px;
}
.kpi-label{
  font-size:14px;
  font-weight:700;
  color:var(--sub);
  margin-bottom:12px;
}
.kpi-value{
  font-size:36px;
  font-weight:900;
  letter-spacing:-.04em;
  line-height:1;
  color:#0b0b0b;
}
.kpi-value.ok{
  color:var(--ok);
}
.kpi-value.warn{
  color:var(--warn);
}
.kpi-sub{
  font-size:14px;
  color:var(--sub);
  margin-top:8px;
}
.filters{
  background:#fff;
  border-radius:14px;
  border:1px solid var(--border);
  padding:22px 26px;
  margin-bottom:24px;
  display:flex;
  gap:14px;
  align-items:center;
}
.search{
  flex:1;
  min-width:320px;
  position:relative;
}
.search input{
  width:100%;
  height:46px;
  padding:0 14px 0 46px;
  border:1px solid var(--border);
  border-radius:10px;
  font-size:16px;
  color:var(--text);
  outline:none;
  background:#fff;
}
.search input:focus{
  border-color:#1A1A1A;
  box-shadow:0 0 0 3px rgba(0,0,0,.04);
}
.search span{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  font-size:17px;
  color:var(--sub);
}
.filter-select{
  height:46px;
  min-width:136px;
  padding:0 42px 0 18px;
  border:1px solid var(--border);
  border-radius:10px;
  font-size:16px;
  color:var(--text);
  background:#fff url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='10' height='7' viewBox='0 0 10 7'%3e%3cpath d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' fill='none' stroke-linecap='round'/%3e%3c/svg%3e") no-repeat right 16px center;
  -webkit-appearance:none;
  appearance:none;
  outline:none;
  cursor:pointer;
}
.count{
  font-size:14px;
  color:var(--sub);
  white-space:nowrap;
}
.table-box{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
}
.table-scroll{
  overflow:auto;
}
.table{
  min-width:1120px;
}
.thead,.row{
  display:grid;
  grid-template-columns:110px 90px 120px 150px 110px 150px 130px 1fr;
  align-items:center;
}
.thead{
  min-height:44px;
  background:#FAFAF9;
  border-bottom:1px solid var(--border);
}
.th{
  font-size:10px;
  font-weight:700;
  color:var(--sub);
  letter-spacing:.06em;
  text-transform:uppercase;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:4px;
  user-select:none;
  padding:0 12px;
}
.th:hover{
  color:var(--text);
}
#rows{
  max-height:calc(100vh - 380px);
  overflow-y:auto;
}
.row{
  min-height:54px;
  border-bottom:1px solid #F5F5F3;
  cursor:pointer;
  transition:background .12s;
}
.row:hover{
  background:#FAFAF9;
}
.td{
  font-size:13px;
  color:var(--text);
  padding:8px 12px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.td.sub{
  color:var(--sub);
  font-size:12px;
}
.td.mono{
  font-family:"DM Mono",monospace;
  font-size:11px;
}
.empty,.loading{
  padding:60px 20px;
  text-align:center;
  color:var(--sub);
  font-size:13px;
}
.spinner{
  display:inline-block;
  width:18px;
  height:18px;
  border:2px solid var(--border);
  border-top-color:var(--text);
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin-right:8px;
  vertical-align:middle;
}
@keyframes spin{
  to{transform:rotate(360deg)}
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  z-index:200;
  display:none;
}
.overlay.show{
  display:block;
}
.panel{
  position:fixed;
  top:0;
  right:0;
  bottom:0;
  width:min(760px,100vw);
  background:#fff;
  z-index:201;
  transform:translateX(100%);
  transition:transform .25s;
  display:flex;
  flex-direction:column;
  border-left:1px solid var(--border);
}
.panel.show{
  transform:translateX(0);
}
.panel-head{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px;
  background:#fff;
}
.close{
  width:34px;
  height:34px;
  border:1px solid var(--border);
  border-radius:9px;
  background:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  transition:.15s;
}
.close:hover{
  background:var(--soft);
}
.panel-title-wrap{
  flex:1;
  min-width:0;
}
.panel-title{
  font-size:15px;
  font-weight:800;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.panel-subtitle{
  font-size:12px;
  color:var(--sub);
  margin-top:2px;
}
.panel-actions{
  display:flex;
  align-items:center;
  gap:8px;
}
.action-btn{
  height:36px;
  padding:0 12px;
  border:1px solid var(--border);
  border-radius:9px;
  background:#fff;
  color:var(--text);
  font-size:12px;
  font-weight:800;
  cursor:pointer;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.15s;
}
.action-btn:hover{
  background:var(--soft);
}
.save-btn{
  height:36px;
  padding:0 16px;
  border:1px solid #1A1A1A;
  border-radius:9px;
  background:#1A1A1A;
  color:#fff;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
  transition:.15s;
}
.save-btn:hover{
  opacity:.88;
}
.save-btn:disabled{
  opacity:.45;
  cursor:not-allowed;
}
.panel-body{
  flex:1;
  overflow-y:auto;
  padding:20px;
  background:#fff;
}
.summary-card{
  background:#1A1A1A;
  color:#fff;
  border-radius:16px;
  padding:18px;
  margin-bottom:18px;
}
.summary-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
}
.summary-name{
  font-size:24px;
  font-weight:900;
  letter-spacing:-.04em;
  line-height:1.15;
}
.summary-phone{
  font-family:"DM Mono",monospace;
  font-size:13px;
  color:rgba(255,255,255,.68);
  margin-top:5px;
}
.summary-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:28px;
  padding:0 10px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
  color:#fff;
  font-size:11px;
  font-weight:800;
  white-space:nowrap;
}
.summary-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:18px;
}
.summary-item{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:11px;
  min-width:0;
}
.summary-label{
  font-size:10px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:rgba(255,255,255,.45);
  margin-bottom:5px;
}
.summary-value{
  font-size:13px;
  font-weight:700;
  color:#fff;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.section{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
  margin-bottom:16px;
}
.section-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.section-title{
  font-size:12px;
  font-weight:900;
  color:#333;
  letter-spacing:-.01em;
}
.section-caption{
  font-size:11px;
  color:var(--sub);
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.grid-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}
.field{
  display:flex;
  flex-direction:column;
  gap:7px;
}
.full{
  grid-column:1/-1;
}
.label{
  font-size:11px;
  font-weight:800;
  color:#777;
}
.readonly{
  min-height:42px;
  padding:12px 13px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#FAFAF9;
  font-size:13px;
  color:#333;
  line-height:1.45;
  white-space:pre-wrap;
}
.input,.select,.textarea{
  width:100%;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  color:var(--text);
  outline:none;
  font-size:14px;
  transition:.15s;
}
.input,.select{
  height:42px;
  padding:0 12px;
}
.select{
  padding-right:34px;
  background:#fff url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='10' height='7' viewBox='0 0 10 7'%3e%3cpath d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' fill='none' stroke-linecap='round'/%3e%3c/svg%3e") no-repeat right 13px center;
  -webkit-appearance:none;
  appearance:none;
}
.textarea{
  min-height:112px;
  resize:vertical;
  padding:12px;
  line-height:1.6;
}
.input:focus,.select:focus,.textarea:focus{
  border-color:#1A1A1A;
  box-shadow:0 0 0 3px rgba(0,0,0,.04);
}
.mini-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:12px;
}
.small-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:34px;
  padding:0 12px;
  border-radius:9px;
  border:1px solid var(--border);
  background:#fff;
  color:#333;
  text-decoration:none;
  font-size:12px;
  font-weight:800;
  cursor:pointer;
}
.small-link:hover{
  background:var(--soft);
}
.file-box{
  border:1px dashed #D8D8D2;
  background:#FAFAF9;
  border-radius:12px;
  padding:14px;
}
.file-input{
  width:100%;
  font-size:13px;
}
.file-hint{
  font-size:11px;
  color:var(--sub);
  margin-top:8px;
  line-height:1.5;
}
.record-list{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:12px;
}
.record-link{
  display:flex;
  align-items:center;
  gap:10px;
  min-height:42px;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  text-decoration:none;
  color:#333;
  font-size:13px;
  font-weight:700;
}
.record-link:hover{
  background:var(--soft);
}
.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  background:var(--text);
  color:#fff;
  padding:11px 20px;
  border-radius:24px;
  font-size:13px;
  font-weight:700;
  z-index:500;
  opacity:0;
  transition:.3s;
  pointer-events:none;
  max-width:calc(100vw - 40px);
  text-align:center;
}
.toast.show{
  opacity:1;
}
@media(max-width:1100px){
  .kpis{grid-template-columns:1fr 1fr}
  .filters{flex-wrap:wrap}
  .main{padding:20px 14px 50px}
}
@media(max-width:760px){
  .panel{width:100%}
  .panel-actions{display:none}
  .summary-grid{grid-template-columns:1fr 1fr}
  .grid,.grid-3{grid-template-columns:1fr}
  .full{grid-column:auto}
  .sub-header-right{position:static;transform:none}
  .sub-header-inner{justify-content:space-between}
  .page-label{font-size:11px;letter-spacing:.16em}
}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-logo">BOOSTIX</div>
</div>

<div class="sub-header">
  <div class="sub-header-inner">
    <div class="page-label"><b>가맹상담 관리</b> · 실시간 대시보드</div>
    <div class="sub-header-right">
      <div style="display:flex;align-items:center;gap:6px">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">연결 중</span>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ 새로고침</button>
    </div>
  </div>
</div>

<main class="main">
  <div class="kpis">
    <div class="kpi">
      <div class="kpi-label">전체 상담</div>
      <div class="kpi-value" id="k-total">0</div>
      <div class="kpi-sub">누적 건수</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">오늘 상담</div>
      <div class="kpi-value ok" id="k-today">0</div>
      <div class="kpi-sub" id="k-date">-</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">점포 있음</div>
      <div class="kpi-value warn" id="k-hasStore">0</div>
      <div class="kpi-sub">기존 점포 보유</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">1차 상담 완료</div>
      <div class="kpi-value" id="k-consultDone">0</div>
      <div class="kpi-sub">상담 기록 작성</div>
    </div>
  </div>

  <div class="filters">
    <div class="search">
      <span>🔍</span>
      <input id="q" placeholder="이름, 연락처, 지역 검색..." oninput="applyFilter()">
    </div>
    <select id="filter-hasStore" class="filter-select" onchange="applyFilter()">
      <option value="">점포 전체</option>
      <option>점포 있음</option>
      <option>점포 없음</option>
      <option>확인 필요</option>
    </select>
    <select id="filter-region" class="filter-select" onchange="applyFilter()">
      <option value="">지역 전체</option>
    </select>
    <select id="filter-source" class="filter-select" onchange="applyFilter()">
      <option value="">유입경로 전체</option>
    </select>
    <div class="count" id="count">0 건</div>
  </div>

  <div class="table-box">
    <div class="table-scroll">
      <div class="table">
        <div class="thead">
          <div class="th" onclick="sortBy('inquiryDate')">문의일자</div>
          <div class="th" onclick="sortBy('inquiryTime')">문의시간</div>
          <div class="th" onclick="sortBy('name')">이름</div>
          <div class="th">연락처</div>
          <div class="th">점포</div>
          <div class="th">창업희망</div>
          <div class="th">유입경로</div>
          <div class="th">비고</div>
        </div>
        <div id="rows">
          <div class="loading"><span class="spinner"></span>데이터 불러오는 중</div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<aside class="panel" id="panel">
  <div class="panel-head">
    <button class="close" onclick="closePanel()">×</button>
    <div class="panel-title-wrap">
      <div class="panel-title" id="panelTitle">1차 상담 기록지</div>
      <div class="panel-subtitle" id="panelSubtitle">고객을 선택해주세요</div>
    </div>
    <div class="panel-actions">
      <a class="action-btn" id="callBtn" href="#">전화하기</a>
      <button class="action-btn" onclick="copyCurrentPhone()">연락처 복사</button>
      <button class="save-btn" id="saveBtnTop" onclick="saveConsult()">저장</button>
    </div>
  </div>
  <div class="panel-body" id="panelBody"></div>
</aside>

<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6xm8AvczOUgBhQua693p0k_xgF3qIDF2YbJlU233X5BT4dOF6zPhOVGzt4E1B1TCsZA/exec";

let all = [];
let filtered = [];
let current = null;
let sortKey = 'inquiryDate';
let sortAsc = false;
let toastTimer = null;

const OPTIONS = {
  firstConsultStatus: ['미작성', '1차 상담 완료'],
  callStatus: ['', '통화완료', '부재', '재통화필요', '상담거절', '번호오류'],
  workType: ['', '신규 창업', '업종 변경', '기존 매장 추가', '배달 전문', '샵인샵', '확인 필요'],
  currentSituation: ['', '점포 보유', '점포 탐색 중', '업종 고민 중', '비용 확인 단계', '타 브랜드 비교 중', '즉시 창업 희망', '단순 문의'],
  inquiryTopic: ['', '창업비용', '수익성', '상권/지역', '메뉴/운영', '배달 운영', '가맹조건', '미팅 요청', '기타'],
  answerType: ['', '기본 안내', '비용 안내', '수익구조 안내', '상권 상담', '자료 발송', '미팅 제안', '보류 안내', '부적합 안내'],

async function loadData(){
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '↻ 로딩 중';

  document.getElementById('rows').innerHTML = '<div class="loading"><span class="spinner"></span>데이터 불러오는 중</div>';

  try{
    const res = await fetch(APPS_SCRIPT_URL + '?action=list&_=' + Date.now());
    const json = await res.json();

    all = (json.data || json.records || [])
      .map(normalize)
      .filter(r => r.id || r.name || r.phone);

    setStatus(true);
    buildFilters();
    applyFilter();

  }catch(e){
    console.error(e);
    setStatus(false);
    document.getElementById('rows').innerHTML = '<div class="empty">연결 실패. Apps Script 배포 상태를 확인해주세요.</div>';
    toast('연결 실패');
  }finally{
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = '↻ 새로고침';
  }
}

function normalize(r){
  const recordLinksRaw = r.recordLinks || r.녹음링크 || '';

  return {
    id: r.id || r.상담번호 || r.consultId || '',
    submittedAt: normalizeDateTime(r.submittedAt || r.제출일시 || ''),

    inquiryDate: normalizeDate(r.inquiryDate || r.문의일자 || r.callDate || r.통화날짜 || ''),
    inquiryTime: normalizeTime(r.inquiryTime || r.문의시간 || r.callTime || r.통화시간 || ''),

    name: r.name || r.이름 || '',
    phone: r.phone || r.연락처 || '',

    hasStore: r.hasStore || r.점포 || r['점포 유/무'] || r.점포유무 || '',
    desiredRegion: r.desiredRegion || r.창업희망지역 || r['창업 희망지역'] || r.region || r.지역 || '',

    source: r.source || r.유입경로 || '',
    sourceEtc: r.sourceEtc || r.기타유입경로 || '',
    note: r.note || r.비고 || r.internalMemo || r.내부메모 || '',

    firstConsultStatus: r.firstConsultStatus || r['1차상담상태'] || '미작성',
    callStatus: r.callStatus || r.상담상태 || '',
    workType: r.workType || r.작업형태 || '',
    currentSituation: r.currentSituation || r.현재상황 || '',
    inquiryTopic: r.inquiryTopic || r.문의주제 || '',
    detailInquiryMemo: r.detailInquiryMemo || r.상세문의메모 || '',
    answerType: r.answerType || r.답변유형 || '',
    answerMemo: r.answerMemo || r.답변메모 || '',

    nextStep: r.nextStep || r.다음단계 || '상담 대기',
    nextActionDetail: r.nextActionDetail || r.다음단계상세 || '',
    nextActionDate: normalizeDate(r.nextActionDate || r.다음액션예정일 || ''),
    nextActionTime: normalizeTime(r.nextActionTime || r.다음액션예정시간 || ''),
    nextActionOwner: r.nextActionOwner || r.담당자 || '',

    recordLinks: parseRecordLinks(recordLinksRaw),

function fillSelect(id, vals, first){
  const el = document.getElementById(id);
  const cur = el.value;

  el.innerHTML = '<option value="">' + esc(first) + '</option>' +
    vals.map(v => '<option>' + esc(v) + '</option>').join('');

  el.value = cur;
}

function sortBy(k){
  if(sortKey === k){
    sortAsc = !sortAsc;
  }else{
    sortKey = k;
    sortAsc = false;
  }

  applyFilter();
}

function applyFilter(){
  const q = document.getElementById('q').value.toLowerCase().trim();
  const hs = document.getElementById('filter-hasStore').value;
  const rg = document.getElementById('filter-region').value;
  const sr = document.getElementById('filter-source').value;

  filtered = all.filter(d => {
    if(q && !['id','name','phone','desiredRegion','source','note','callStatus','nextStep','finalStatus'].some(k => String(d[k] || '').toLowerCase().includes(q))) return false;
    if(hs && d.hasStore !== hs) return false;
    if(rg && d.desiredRegion !== rg) return false;
    if(sr && d.source !== sr) return false;
    return true;
  });

  filtered.sort((a,b) => {
    const va = String(a[sortKey] || '');
    const vb = String(b[sortKey] || '');

    if(sortKey === 'inquiryDate'){
      const aa = (a.inquiryDate || '') + ' ' + (a.inquiryTime || '');
      const bb = (b.inquiryDate || '') + ' ' + (b.inquiryTime || '');
      return sortAsc ? aa.localeCompare(bb) : bb.localeCompare(aa);
    }

    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  document.getElementById('count').textContent = filtered.length + ' 건';
  renderRows();
  updateKpi();
}

function updateKpi(){
  const today = getKstToday();

  document.getElementById('k-total').textContent = all.length;
  document.getElementById('k-today').textContent = all.filter(x => String(x.inquiryDate || x.submittedAt || '').startsWith(today)).length;
  document.getElementById('k-date').textContent = today;
  document.getElementById('k-hasStore').textContent = all.filter(x => x.hasStore === '점포 있음').length;
  document.getElementById('k-consultDone').textContent = all.filter(x => x.firstConsultStatus === '1차 상담 완료').length;
}

function readonlyField(label, value, full){

function selectField(label, id, options, value){

    <div class="field">
      <label class="label">${esc(label)}</label>
      <select class="select" id="${escAttr(id)}">
        ${makeOptions(options, value)}
      </select>

}

function makeOptions(options, value){
  return options.map(v => {
    const label = v || '선택';
    const selected = String(v) === String(value || '') ? ' selected' : '';
    return `<option value="${escAttr(v)}"${selected}>${esc(label)}</option>`;
  }).join('');
}

function renderRecordLinks(links){
  if(!links || !links.length){
    return '<div class="record-list"><div class="readonly">등록된 녹음 파일이 없습니다.</div></div>';
  }

  return `
    <div class="record-list">
      ${links.map((url,i) => `
        <a class="record-link" href="${escAttr(url)}" target="_blank">
          <span>🎵</span>
          <span>녹음 파일 ${i + 1}</span>

}

async function saveConsult(){
  if(!current || !current.id){
    toast('저장할 상담을 선택해주세요');
    return;
  }

  const topBtn = document.getElementById('saveBtnTop');
  const bottomBtn = document.getElementById('saveBtnBottom');

  setSaving(true, topBtn, bottomBtn);

  try{
    const updates = collectUpdates();
    const newRecords = await collectRecordFiles();

    const payload = {
      id: current.id,
      consultId: current.id,
      updates,
      newRecords
    };

    const fd = new FormData();
    fd.append('action', 'update');
    fd.append('data', JSON.stringify(payload));

    const res = await fetch(APPS_SCRIPT_URL + '?action=update', {
      method:'POST',
      body:fd
    });

    const text = await res.text();
    let result = {};

    try{
      result = JSON.parse(text);
    }catch(err){
      result = {
        result: res.ok ? 'success' : 'error',
        raw:text
      };
    }

    if(!res.ok || result.result !== 'success'){
      throw new Error(result.message || result.error || '저장 실패');
    }

    Object.assign(current, updates);

    if(result.recordLinks && Array.isArray(result.recordLinks)){
      current.recordLinks = result.recordLinks;
      current.recordLinksRaw = result.recordLinks.join('\n');
    }

    toast('1차 상담 기록 저장 완료');

    await loadData();

    const updated = all.find(x => x.id === current.id);
    if(updated){
      current = updated;
      renderPanel();
    }

  }catch(err){
    console.error(err);
    toast('저장 실패: ' + err.message);
  }finally{
    setSaving(false, topBtn, bottomBtn);
  }
}

function collectUpdates(){
  return {
    firstConsultStatus: valueOf('edit-firstConsultStatus'),
    callStatus: valueOf('edit-callStatus'),
    workType: valueOf('edit-workType'),
    currentSituation: valueOf('edit-currentSituation'),
    inquiryTopic: valueOf('edit-inquiryTopic'),
    detailInquiryMemo: valueOf('edit-detailInquiryMemo'),

    answerType: valueOf('edit-answerType'),
    answerMemo: valueOf('edit-answerMemo'),

    nextStep: valueOf('edit-nextStep'),
    nextActionDetail: valueOf('edit-nextActionDetail'),
    nextActionDate: valueOf('edit-nextActionDate'),
    nextActionTime: valueOf('edit-nextActionTime'),
    nextActionOwner: valueOf('edit-nextActionOwner'),
    nextActionMemo: valueOf('edit-nextActionMemo'),

    finalStatus: valueOf('edit-finalStatus')
  };
}

async function collectRecordFiles(){
  const input = document.getElementById('recordFiles');
  if(!input || !input.files || !input.files.length) return [];

  const files = Array.from(input.files);
  const result = [];

  for(const file of files){
    const src = await fileToDataUrl(file);

    result.push({
      name:file.name,
      type:file.type || 'audio/mp4',
      size:file.size,
      src
    });
  }

  return result;
}

function fileToDataUrl(file){
  return new Promise((resolve,reject) => {
    const reader = new FileReader();

    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error('파일 읽기 실패: ' + file.name));

    reader.readAsDataURL(file);
  });
}

function setSaving(isSaving, topBtn, bottomBtn){
  [topBtn, bottomBtn].forEach(btn => {
    if(!btn) return;

    btn.disabled = isSaving;
    btn.textContent = isSaving ? '저장 중...' : (btn.id === 'saveBtnBottom' ? '1차 상담 기록 저장' : '저장');
  });
}

function valueOf(id){
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function closePanel(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  current = null;

function copyCurrentPhone(){
  if(!current || !current.phone){
    toast('복사할 연락처가 없습니다');
    return;
  }

  const phone = current.phone;

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(phone)
      .then(() => toast('연락처 복사 완료'))
      .catch(() => fallbackCopy(phone));
  }else{
    fallbackCopy(phone);
  }
}

function fallbackCopy(text){
  const input = document.createElement('input');
  input.value = text;
  document.body.appendChild(input);
  input.select();

  try{
    document.execCommand('copy');
    toast('연락처 복사 완료');
  }catch(err){
    toast('복사 실패');
  }

  document.body.removeChild(input);
}

function parseRecordLinks(raw){
  if(Array.isArray(raw)) return raw.filter(Boolean);

  return String(raw || '')
    .split('\n')
    .map(x => x.trim())
    .filter(Boolean);
}

function normalizeDate(v){
  const s = String(v || '').trim();

  if(!s) return '';

  if(/^\d{4}-\d{2}-\d{2}/.test(s)){
    return s.slice(0,10);
  }

  return s;
}

function normalizeDateTime(v){
  const s = String(v || '').trim();

  if(!s) return '';

  if(/^\d{4}-\d{2}-\d{2}T/.test(s)){
    return s.replace('T', ' ').slice(0,19);
  }

  return s;
}

function normalizeTime(v){
  const s = String(v || '').trim();

  if(!s) return '';

  if(/^\d{2}:\d{2}/.test(s)){
    return s.slice(0,5);
  }

  if(s === '1899-12-31') return '';

  return s;
}

function getKstToday(){
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone:'Asia/Seoul',
    year:'numeric',
    month:'2-digit',
    day:'2-digit'
  }).formatToParts(new Date());

  const m = Object.fromEntries(parts.map(p => [p.type, p.value]));

  return `${m.year}-${m.month}-${m.day}`;
}

function onlyPhoneNumber(v){
  return String(v || '').replace(/[^\d+]/g, '');
}

function unique(arr){
  return [...new Set(arr.map(v => String(v || '').trim()).filter(Boolean))];
}

function esc(s){
  return String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function escAttr(s){
  return esc(s).replace(/'/g,'&#39;');
}

function escTextarea(s){
  return String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function toast(msg){
  const t = document.getElementById('toast');

  t.textContent = msg;
  t.classList.add('show');

  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

loadData();
</script>
