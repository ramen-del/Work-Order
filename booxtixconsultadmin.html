<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOSTIX · 가맹상담 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--text:#1A1A1A;--sub:#999;--border:#E8E8E4;--soft:#F5F5F3;--ok:#2D7A55;--err:#E05252;--warn:#D97706;--info:#1565C0;--radius:12px}
html,body{min-height:100vh;background:#F7F7F5;font-family:"Noto Sans KR",sans-serif;color:var(--text)}
.nav{height:70px;background:#fff;border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:100}
.nav-logo{font-size:22px;font-weight:900;letter-spacing:-.035em;color:#333}
.sub-header{height:46px;background:#fff;padding:0 20px;border-bottom:1px solid var(--border);position:sticky;top:70px;z-index:99;display:flex;align-items:center}
.sub-header-inner{max-width:none;width:100%;margin:0 auto;position:relative;display:flex;align-items:center;justify-content:center;gap:12px}
.page-label{font-family:"DM Mono",monospace;font-size:13px;letter-spacing:.28em;color:var(--sub);font-weight:400}
.page-label b{color:var(--text);font-weight:700}
.sub-header-right{position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:10px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#2D7A55}
.status-text{font-size:13px;color:var(--sub)}
.refresh-btn{height:38px;padding:0 18px;background:#fff;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:.15s}
.refresh-btn:hover{background:var(--soft)}
.refresh-btn.loading{opacity:.6;pointer-events:none}
.main{max-width:100%;margin:0;padding:36px 34px 60px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:30px}
.kpi{background:#fff;border-radius:14px;border:1px solid var(--border);padding:28px 30px;min-height:124px}
.kpi-label{font-size:14px;font-weight:700;color:var(--sub);margin-bottom:12px}
.kpi-value{font-size:36px;font-weight:900;letter-spacing:-.04em;line-height:1;color:#0b0b0b}
.kpi-value.ok{color:var(--ok)}
.kpi-value.warn{color:var(--warn)}
.kpi-sub{font-size:14px;color:var(--sub);margin-top:8px}
.filters{background:#fff;border-radius:14px;border:1px solid var(--border);padding:22px 26px;margin-bottom:24px;display:flex;gap:14px;align-items:center}
.search{flex:1;min-width:320px;position:relative}
.search input{width:100%;height:46px;padding:0 14px 0 46px;border:1px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;color:var(--text);outline:none;background:#fff}
.search span{position:absolute;left:20px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--sub)}
.filter-select{height:46px;min-width:136px;padding:0 42px 0 18px;border:1px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;color:var(--text);background:#fff url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='10' height='7' viewBox='0 0 10 7'%3e%3cpath d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' fill='none' stroke-linecap='round'/%3e%3c/svg%3e") no-repeat right 16px center;-webkit-appearance:none;appearance:none;outline:none;cursor:pointer}
.count{font-size:14px;color:var(--sub);white-space:nowrap}
.table-box{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.table-scroll{overflow:auto}
.table{min-width:1120px}
.thead,.row{display:grid;grid-template-columns:110px 90px 120px 150px 110px 150px 130px 1fr;align-items:center}
.thead{min-height:44px;background:#FAFAF9;border-bottom:1px solid var(--border)}
.th{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none;padding:0 12px}
.th:hover{color:var(--text)}
#rows{max-height:calc(100vh - 380px);overflow-y:auto}
.row{min-height:54px;border-bottom:1px solid #F5F5F3;cursor:pointer;transition:background .12s}
.row:hover{background:#FAFAF9}
.td{font-size:13px;color:var(--text);padding:8px 12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td.sub{color:var(--sub);font-size:12px}
.td.mono{font-family:"DM Mono",monospace;font-size:11px}
.empty,.loading{padding:60px 20px;text-align:center;color:var(--sub);font-size:13px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none}
.overlay.show{display:block}
.panel{position:fixed;top:0;right:0;bottom:0;width:min(680px,100vw);background:#fff;z-index:201;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;border-left:1px solid var(--border)}
.panel.show{transform:translateX(0)}
.panel-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.close{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s}
.close:hover{background:var(--soft)}
.panel-title{font-size:15px;font-weight:700;flex:1}
.panel-body{flex:1;overflow-y:auto;padding:20px}
.section{margin-bottom:22px}
.section-title{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:3px}
.label{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.06em;text-transform:uppercase}
.value{font-size:13px;font-weight:500;color:var(--text);line-height:1.5}
.full{grid-column:1/-1}
.memo{background:var(--soft);border-radius:8px;padding:12px;font-size:13px;line-height:1.7;color:#333;white-space:pre-wrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:500;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:900px){.kpis{grid-template-columns:1fr 1fr}.filters{flex-wrap:wrap}.main{padding:20px 14px 50px}.panel{width:100%}}
</style>
</head>
<body>
<div class="nav"><div class="nav-logo">BOOSTIX</div></div>
<div class="sub-header">
  <div class="sub-header-inner">
    <div class="page-label"><b>가맹상담 관리</b> · 실시간 대시보드</div>
    <div class="sub-header-right">
      <div style="display:flex;align-items:center;gap:6px"><span class="status-dot" id="statusDot"></span><span class="status-text" id="statusText">연결 중</span></div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ 새로고침</button>
    </div>
  </div>
</div>
<main class="main">
  <div class="kpis">
    <div class="kpi"><div class="kpi-label">전체 상담</div><div class="kpi-value" id="k-total">0</div><div class="kpi-sub">누적 건수</div></div>
    <div class="kpi"><div class="kpi-label">오늘 상담</div><div class="kpi-value ok" id="k-today">0</div><div class="kpi-sub" id="k-date">-</div></div>
    <div class="kpi"><div class="kpi-label">점포 있음</div><div class="kpi-value warn" id="k-hasStore">0</div><div class="kpi-sub">기존 점포 보유</div></div>
    <div class="kpi"><div class="kpi-label">서면 희망</div><div class="kpi-value" id="k-seomyeon">0</div><div class="kpi-sub">부산 서면 지역</div></div>
  </div>
  <div class="filters">
    <div class="search"><span>🔍</span><input id="q" placeholder="이름, 연락처, 지역 검색..." oninput="applyFilter()"></div>
    <select id="f-hasStore" class="filter-select" onchange="applyFilter()"><option value="">점포 전체</option><option>점포 있음</option><option>점포 없음</option></select>
    <select id="f-region" class="filter-select" onchange="applyFilter()"><option value="">지역 전체</option></select>
    <select id="f-source" class="filter-select" onchange="applyFilter()"><option value="">유입경로 전체</option></select>
    <div class="count" id="count">0 건</div>
  </div>
  <div class="table-box"><div class="table-scroll"><div class="table">
    <div class="thead">
      <div class="th" onclick="sortBy('inquiryDate')">문의일자</div>
      <div class="th" onclick="sortBy('inquiryTime')">문의시간</div>
      <div class="th" onclick="sortBy('name')">이름</div>
      <div class="th">연락처</div>
      <div class="th">점포</div>
      <div class="th">창업희망</div>
      <div class="th">유입경로</div>
      <div class="th">비고</div>
    </div>
    <div id="rows"><div class="loading"><span class="spinner"></span>데이터 불러오는 중</div></div>
  </div></div></div>
</main>
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<aside class="panel" id="panel">
  <div class="panel-head"><button class="close" onclick="closePanel()">×</button><div class="panel-title" id="panelTitle">상담 상세</div></div>
  <div class="panel-body" id="panelBody"></div>
</aside>
<div class="toast" id="toast"></div>
<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxOlDe8GsPhHOPICjJfCrGPcvKd1l69He5Q0p_wAW_w46UetUzn4EzvKZyivz-IauOjzw/exec";
let all=[], filtered=[], current=null, sortKey='inquiryDate', sortAsc=false;

async function loadData(){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true;btn.textContent='↻ 로딩 중';
  document.getElementById('rows').innerHTML='<div class="loading"><span class="spinner"></span>데이터 불러오는 중</div>';
  try{
    const res=await fetch(APPS_SCRIPT_URL+'?action=list&_='+Date.now());
    const json=await res.json();
    all=(json.data||json.records||[]).map(normalize).filter(r=>r.id||r.name||r.phone);
    setStatus(true);buildFilters();applyFilter();
  }catch(e){
    console.error(e);setStatus(false);
    document.getElementById('rows').innerHTML='<div class="empty">연결 실패. Apps Script 확인 필요.</div>';
    toast('연결 실패');
  }finally{btn.disabled=false;btn.textContent='↻ 새로고침'}
}

function normalize(r){
  return {
    id: r.id||r.상담번호||r.consultId||'',
    submittedAt: r.submittedAt||r.제출일시||'',
    inquiryDate: r.inquiryDate||r.문의일자||r.callDate||r.통화날짜||'',
    inquiryTime: r.inquiryTime||r.문의시간||r.callTime||r.통화시간||'',
    name: r.name||r.이름||'',
    phone: r.phone||r.연락처||'',
    hasStore: r.hasStore||r.점포||r['점포 유/무']||r.점포유무||'',
    desiredRegion: r.desiredRegion||r.창업희망지역||r['창업 희망지역']||r.region||r.지역||'',
    source: r.source||r.유입경로||'',
    note: r.note||r.비고||r.internalMemo||r.내부메모||''
  }
}

function setStatus(ok){
  document.getElementById('statusDot').style.background=ok?'#2D7A55':'#E05252';
  document.getElementById('statusText').textContent=ok?'연결됨':'오프라인';
}

function buildFilters(){
  fillSelect('f-region',[...new Set(all.map(x=>x.desiredRegion).filter(Boolean))],'지역 전체');
  fillSelect('f-source',[...new Set(all.map(x=>x.source).filter(Boolean))],'유입경로 전체');
}

function fillSelect(id,vals,first){
  const el=document.getElementById(id),cur=el.value;
  el.innerHTML='<option value="">'+first+'</option>'+vals.map(v=>`<option>${esc(v)}</option>`).join('');
  el.value=cur;
}

function sortBy(k){if(sortKey===k)sortAsc=!sortAsc;else{sortKey=k;sortAsc=false}applyFilter()}

function applyFilter(){
  const q=document.getElementById('q').value.toLowerCase();
  const hs=document.getElementById('f-hasStore').value;
  const rg=document.getElementById('f-region').value;
  const sr=document.getElementById('f-source').value;
  filtered=all.filter(d=>{
    if(q&&!['id','name','phone','desiredRegion','source','note'].some(k=>(d[k]||'').toLowerCase().includes(q)))return false;
    if(hs&&d.hasStore!==hs)return false;
    if(rg&&d.desiredRegion!==rg)return false;
    if(sr&&d.source!==sr)return false;
    return true;
  });
  filtered.sort((a,b)=>{
    const va=a[sortKey]||'',vb=b[sortKey]||'';
    return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
  });
  document.getElementById('count').textContent=filtered.length+' 건';
  renderRows();updateKpi();
}

function updateKpi(){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('k-total').textContent=all.length;
  document.getElementById('k-today').textContent=all.filter(x=>(x.inquiryDate||x.submittedAt||'').startsWith(today)).length;
  document.getElementById('k-date').textContent=today;
  document.getElementById('k-hasStore').textContent=all.filter(x=>x.hasStore==='점포 있음').length;
  document.getElementById('k-seomyeon').textContent=all.filter(x=>(x.desiredRegion||'').includes('서면')).length;
}

function renderRows(){
  if(!filtered.length){
    document.getElementById('rows').innerHTML='<div class="empty">표시할 상담이 없습니다.</div>';
    return;
  }
  document.getElementById('rows').innerHTML=filtered.map((d,i)=>`<div class="row" onclick="openPanel(${i})">
    <div class="td mono">${esc(d.inquiryDate||'-')}</div>
    <div class="td sub">${esc(d.inquiryTime||'-')}</div>
    <div class="td"><b>${esc(d.name||'-')}</b></div>
    <div class="td sub">${esc(d.phone||'-')}</div>
    <div class="td">${esc(d.hasStore||'-')}</div>
    <div class="td sub">${esc(d.desiredRegion||'-')}</div>
    <div class="td sub">${esc(d.source||'-')}</div>
    <div class="td sub">${esc(d.note||'-')}</div>
  </div>`).join('');
}

function openPanel(i){
  current=filtered[i];
  const f=(l,v)=>v?`<div class="field"><div class="label">${l}</div><div class="value">${esc(v)}</div></div>`:'';
  const m=(l,v)=>v?`<div class="field full"><div class="label">${l}</div><div class="memo">${esc(v)}</div></div>`:'';
  document.getElementById('panelTitle').textContent=(current.name||'-')+' · '+(current.phone||'-');
  document.getElementById('panelBody').innerHTML=`
    <div class="section"><div class="section-title">1차 접수 기록</div><div class="grid">
      ${f('상담번호',current.id)}${f('제출일시',current.submittedAt)}
      ${f('문의일자',current.inquiryDate)}${f('문의시간',current.inquiryTime)}
      ${f('이름',current.name)}${f('연락처',current.phone)}
      ${f('점포 유/무',current.hasStore)}${f('창업 희망지역',current.desiredRegion)}
      ${f('유입경로',current.source)}${m('비고',current.note)}
    </div></div>`;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('panel').classList.add('show');
}

function closePanel(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  current=null;
}

function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}
loadData();
</script>
</body>
</html>
