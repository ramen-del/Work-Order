<main class="main">

  <section class="kpi-row">
    <div class="kpi"><div class="kpi-label">Total Leads</div><div class="kpi-value" id="kpiTotal">0</div><div class="kpi-sub">전체 문의</div></div>
    <div class="kpi"><div class="kpi-label">Today</div><div class="kpi-value" id="kpiToday">0</div><div class="kpi-sub" id="kpiDate">오늘</div></div>

  </section>

    <div class="search"><span class="ico">⌕</span><input id="searchInput" type="text" placeholder="이름, 연락처, 지역, 메모 검색" oninput="applyFilter()"></div>
    <select id="filterStatus" onchange="applyFilter()"><option value="">상태 전체</option><option>신규 문의</option><option>미통화</option><option>통화 완료</option><option>부재</option><option>재통화 예정</option><option>미팅 예약</option><option>계약 진행</option><option>보류</option><option>관리 불필요</option></select>
    <select id="filterSource" onchange="applyFilter()"><option value="">유입 전체</option></select>
    <select id="filterStore" onchange="applyFilter()"><option value="">점포 전체</option><option>점포 있음</option><option>점포 없음</option><option>확인 필요</option></select>
    <select id="sortSelect" onchange="setSortFromSelect()"><option value="desc">문의일자 최신순</option><option value="asc">문의일자 오래된순</option></select>
    <span class="count" id="filterCount">0 건</span>

    </div>
    <div id="tableBody"><div class="loading"><span class="spinner"></span>데이터 불러오는 중</div></div>
  </section>
</main>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNnfuB6Ft357S-QsWxRROnUsx5R1gNT2csqZwYuEcwOdEx8yL4wdYeh7L04fEszaDEkg/exec";
let allData = [], filtered = [], currentIdx = null, sortKey = 'inquiryDateTime', sortAsc = false;
let currentTab = 'view';
let editHistory = JSON.parse(localStorage.getItem('booxtix_admin_history') || '{}');
const EDITABLE_FIELDS = ['manager','callStatus','callDate','callTime','callMemo','interest','will','openTime','budget','answerMemo','nextStep','finalStatus','recallDate','recallTime','meetingDate','meetingRound','holdReason','internalMemo'];

function pick(obj, keys, fallback=''){
  for(const k of keys){ if(obj && obj[k] !== undefined && obj[k] !== null && String(obj[k]).trim() !== '') return String(obj[k]).trim(); }
  return fallback;
}
function esc(v){return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));}
function todayKST(){return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());}
function rowId(d){return d.id || d.consultId || d['상담번호'] || d['접수번호'] || `${d.name}_${d.phone}_${d.inquiryDate}_${d.inquiryTime}`;}

function normalize(raw){
  const d = {...raw};
  d.inquiryDate = pick(raw, ['inquiryDate','문의일자','문의 일자','callDate','날짜','date']);
  d.inquiryTime = pick(raw, ['inquiryTime','문의시간','문의 시간','callTime','시간','time']);
  d.name = pick(raw, ['name','이름','성명']);
  d.phone = pick(raw, ['phone','연락처','전화번호','휴대폰']);
  d.hasStore = pick(raw, ['hasStore','점포유무','점포 유/무','점포','storeStatus','shopStatus']);
  d.desiredRegion = pick(raw, ['desiredRegion','창업희망지역','창업 희망지역','희망지역','region','지역']);
  d.source = pick(raw, ['source','유입경로','유입 경로']);
  d.note = pick(raw, ['note','비고','basicMemo','메모','inquiry']);
  d.manager = pick(raw, ['manager','담당자']);
  d.callStatus = pick(raw, ['callStatus','통화상태','통화 상태'], '미통화');
  d.interest = pick(raw, ['interest','관심도','고객 관심도']);
  d.nextStep = pick(raw, ['nextStep','다음단계','다음 단계'], '상담 대기');
  d.finalStatus = pick(raw, ['finalStatus','최종상태','최종 상태','leadStatus'], '신규 문의');
  d.callDate = pick(raw, ['callDate','통화날짜','통화 날짜']);
  d.callTime = pick(raw, ['callTime','통화시간','통화 시간']);
  d.callMemo = pick(raw, ['callMemo','통화내용','통화 내용']);
  d.will = pick(raw, ['will','창업의지','창업 의지']);
  d.openTime = pick(raw, ['openTime','예상오픈시점','예상 오픈 시점']);
  d.budget = pick(raw, ['budget','창업비용상태','창업비용 상태']);
  d.answerMemo = pick(raw, ['answerMemo','답변메모','답변 메모']);
  d.recallDate = pick(raw, ['recallDate','재통화날짜','재통화 날짜']);
  d.recallTime = pick(raw, ['recallTime','재통화시간','재통화 시간']);
  d.meetingDate = pick(raw, ['meetingDate','미팅날짜','미팅 날짜']);
  d.meetingRound = pick(raw, ['meetingRound','미팅회차','미팅 회차']);
  d.holdReason = pick(raw, ['holdReason','보류사유','보류 사유']);
  d.internalMemo = pick(raw, ['internalMemo','내부메모','내부 메모']);
  d.inquiryDateTime = `${d.inquiryDate || '0000-00-00'} ${d.inquiryTime || '00:00'}`;
  d.id = rowId(d);
  return d;
}

async function loadData(){
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.textContent = '↻ 로딩 중';
  document.getElementById('tableBody').innerHTML = '<div class="loading"><span class="spinner"></span>데이터 불러오는 중</div>';
  try{
    const res = await fetch(APPS_SCRIPT_URL + '?action=list&ts=' + Date.now());
    const json = await res.json();
    const rows = Array.isArray(json) ? json : (json.data || json.rows || []);
    allData = rows.map(normalize);
    updateSourceFilter();
    applyFilter();
    updateKpi();
    setStatus(true);
  }catch(err){
    setStatus(false);
    document.getElementById('tableBody').innerHTML = '<div class="empty"><span class="empty-icon">⚠️</span><b>연결 실패</b><br>Apps Script 조회 응답을 확인해주세요.</div>';
    showToast('⚠ 데이터 불러오기 실패: ' + err.message);
  }finally{
    btn.classList.remove('loading');
    btn.textContent = '↻ 새로고침';
  }
}

function updateSourceFilter(){
  const sel = document.getElementById('filterSource');
  const current = sel.value;
  const sources = [...new Set(allData.map(d => d.source).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ko'));
  sel.innerHTML = '<option value="">유입 전체</option>' + sources.map(s => `<option>${esc(s)}</option>`).join('');
  sel.value = current;
}

function updateKpi(){
  const today = todayKST();
  document.getElementById('kpiTotal').textContent = allData.length;
  document.getElementById('kpiToday').textContent = allData.filter(d => d.inquiryDate === today).length;
  document.getElementById('kpiDate').textContent = today;
  document.getElementById('kpiNew').textContent = allData.filter(d => ['신규 문의','미통화',''].includes(d.finalStatus) || ['상담 대기',''].includes(d.nextStep)).length;
  document.getElementById('kpiHot').textContent = allData.filter(d => ['매우 높음','높음'].includes(d.interest)).length;
}

function applyFilter(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const source = document.getElementById('filterSource').value;
  const store = document.getElementById('filterStore').value;
  filtered = allData.filter(d => {
    const searchBlob = [d.name,d.phone,d.desiredRegion,d.source,d.note,d.callMemo,d.answerMemo,d.internalMemo].join(' ').toLowerCase();
    if(q && !searchBlob.includes(q)) return false;
    if(source && d.source !== source) return false;
    if(store && d.hasStore !== store) return false;
    if(status && ![d.callStatus,d.finalStatus,d.nextStep].includes(status)) return false;
    return true;
  });
  filtered.sort((a,b) => {
    const va = a[sortKey] || '';
    const vb = b[sortKey] || '';
    return sortAsc ? va.localeCompare(vb,'ko') : vb.localeCompare(va,'ko');
  });
  document.getElementById('filterCount').textContent = filtered.length + ' 건';
  renderTable();
}

function setSortFromSelect(){sortKey='inquiryDateTime';sortAsc = document.getElementById('sortSelect').value === 'asc';applyFilter();}
function sortBy(key){ if(sortKey === key) sortAsc = !sortAsc; else {sortKey = key; sortAsc = false;} if(key === 'inquiryDateTime') document.getElementById('sortSelect').value = sortAsc ? 'asc' : 'desc'; applyFilter(); }
function statusClass(v){ if(['통화 완료','미팅 예약','계약 진행','계약 완료'].includes(v)) return 'ok'; if(['부재','재통화 예정','상담 대기','자료 발송'].includes(v)) return 'warn'; if(['관심 없음','보류','관리 불필요'].includes(v)) return 'err'; if(['신규 문의','미통화'].includes(v)) return 'info'; return 'grey';}

function renderTable(){
  if(!filtered.length){document.getElementById('tableBody').innerHTML = '<div class="empty"><span class="empty-icon">🔍</span><b>검색 결과 없음</b><br>조건에 맞는 문의가 없습니다.</div>';return;}
  document.getElementById('tableBody').innerHTML = filtered.map((d,i) => {
    const status = d.finalStatus === '신규 문의' ? d.callStatus : (d.callStatus || d.finalStatus);
    return `<div class="table-row" onclick="openPanel(${i})">
      <div class="td mono">${esc(d.inquiryDate || '-')}</div><div class="td mono">${esc(d.inquiryTime || '-')}</div><div class="td"><strong>${esc(d.name || '-')}</strong></div><div class="td sub">${esc(d.phone || '-')}</div><div class="td"><span class="badge grey">${esc(d.hasStore || '-')}</span></div><div class="td sub">${esc(d.desiredRegion || '-')}</div><div class="td sub">${esc(d.source || '-')}</div><div class="td"><span class="badge ${statusClass(status)}">${esc(status || '-')}</span></div><div class="td"><span class="badge ${statusClass(d.nextStep)}">${esc(d.nextStep || '-')}</span></div>
    </div>`;
  }).join('');
}

function openPanel(idx){
  currentIdx = idx;
  const d = filtered[idx];
  document.getElementById('panelTitle').textContent = `${d.name || '이름 없음'} · ${d.phone || ''}`;
  document.getElementById('panelBadge').innerHTML = `<span class="badge ${statusClass(d.finalStatus)}">${esc(d.finalStatus || '신규 문의')}</span>`;
  renderView(d); fillEditForm(d); renderHistory(d); switchTab('view');
  document.getElementById('panelOverlay').classList.add('show');
  document.getElementById('detailPanel').classList.add('show');
}
function closePanel(){document.getElementById('panelOverlay').classList.remove('show');document.getElementById('detailPanel').classList.remove('show');currentIdx=null;}
function switchTab(tab){currentTab=tab;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['view','edit','history'][i]===tab));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(tab+'Tab').classList.add('active');document.getElementById('editActions').style.display = tab === 'edit' ? 'flex' : 'none';}

function f(label,val){return val ? `<div class="field"><div class="label">${esc(label)}</div><div class="value">${esc(val)}</div></div>` : '';}
function memo(label,val){return val ? `<div style="margin-top:12px"><div class="label" style="margin-bottom:6px">${esc(label)}</div><div class="memo">${esc(val)}</div></div>` : '';}
function renderView(d){
  document.getElementById('panelBody').innerHTML = `
    <div class="section"><div class="section-title">1차 접수 기본정보</div><div class="grid">${f('문의 일자',d.inquiryDate)}${f('문의 시간',d.inquiryTime)}${f('이름',d.name)}${f('연락처',d.phone)}${f('점포 유/무',d.hasStore)}${f('창업 희망지역',d.desiredRegion)}${f('유입경로',d.source)}</div>${memo('비고',d.note)}</div>
    <div class="section"><div class="section-title">관리자 상담 정보</div><div class="grid">${f('담당자',d.manager)}${f('통화 상태',d.callStatus)}${f('통화 일시', [d.callDate,d.callTime].filter(Boolean).join(' '))}${f('관심도',d.interest)}${f('창업 의지',d.will)}${f('예상 오픈 시점',d.openTime)}${f('창업비용 상태',d.budget)}${f('최종 상태',d.finalStatus)}</div>${memo('통화 내용',d.callMemo)}${memo('답변 메모',d.answerMemo)}</div>
    <div class="section"><div class="section-title">다음 액션</div><div class="next-box"><div class="next-label">NEXT ACTION</div><div class="next-value">${esc(d.nextStep || '상담 대기')}</div>${d.recallDate ? `<div class="next-date">📞 재통화 ${esc(d.recallDate)} ${esc(d.recallTime)}</div>` : ''}${d.meetingDate ? `<div class="next-date">🤝 미팅 ${esc(d.meetingDate)} ${esc(d.meetingRound)}</div>` : ''}</div><div class="grid" style="margin-top:12px">${f('보류 사유',d.holdReason)}</div>${memo('내부 메모',d.internalMemo)}</div>`;
}

function fillEditForm(d){EDITABLE_FIELDS.forEach(k => {const el = document.getElementById('e-' + k); if(el) el.value = d[k] || '';});}
function cancelEdit(){switchTab('view');}
function fieldLabel(k){return {manager:'담당자',callStatus:'통화 상태',callDate:'통화 날짜',callTime:'통화 시간',callMemo:'통화 내용',interest:'관심도',will:'창업 의지',openTime:'예상 오픈 시점',budget:'창업비용 상태',answerMemo:'답변 메모',nextStep:'다음 단계',finalStatus:'최종 상태',recallDate:'재통화 날짜',recallTime:'재통화 시간',meetingDate:'미팅 날짜',meetingRound:'미팅 회차',holdReason:'보류 사유',internalMemo:'내부 메모'}[k] || k;}

async function saveEdit(){
  if(currentIdx === null) return;
  const d = filtered[currentIdx];
  const id = rowId(d);
  const updates = {};
  const changes = [];
  EDITABLE_FIELDS.forEach(k => {
    const el = document.getElementById('e-' + k);
    if(!el) return;
    const newVal = el.value.trim();
    const oldVal = (d[k] || '').trim();
    updates[k] = newVal;
    if(newVal !== oldVal){ changes.push({field:fieldLabel(k),old:oldVal || '없음',new:newVal || '없음'}); d[k] = newVal; }
  });
  if(!changes.length){showToast('변경된 내용이 없습니다.');return;}
  d.inquiryDateTime = `${d.inquiryDate || '0000-00-00'} ${d.inquiryTime || '00:00'}`;
  try{
    const fd = new FormData();
    fd.append('action','update');
    fd.append('data', JSON.stringify({id, updates}));
    const res = await fetch(APPS_SCRIPT_URL, {method:'POST', body:fd});
    const text = await res.text();
    let result = {};
    try{result = JSON.parse(text);}catch(err){result = {result: res.ok ? 'success' : 'error', raw:text};}
    if(!res.ok || (result.result && result.result !== 'success') || (result.status && !['success','ok'].includes(result.status))){throw new Error(result.error || result.message || '서버 저장 실패');}
    if(!editHistory[id]) editHistory[id] = [];
    editHistory[id].unshift({time:new Date().toLocaleString('ko-KR'),editor:'관리자',changes});
    localStorage.setItem('booxtix_admin_history', JSON.stringify(editHistory));
    updateKpi(); applyFilter(); renderView(d); renderHistory(d); switchTab('view');
    showToast('✓ 변경사항이 저장되었습니다.');
  }catch(err){
    showToast('⚠ 저장 실패: ' + err.message);
  }
}

function renderHistory(d){
  const hist = editHistory[rowId(d)] || [];
  document.getElementById('historyCount').textContent = hist.length ? ` (${hist.length})` : '';
  if(!hist.length){document.getElementById('historyBody').innerHTML = '<div class="history-empty">수정 내역이 없습니다.</div>';return;}
  document.getElementById('historyBody').innerHTML = hist.map(h => `<div class="history-item"><div class="history-meta"><span class="history-time">${esc(h.time)}</span><span class="history-editor">${esc(h.editor)}</span></div>${h.changes.map(c => `<div class="history-change"><b>${esc(c.field)}</b> <span class="old">${esc(c.old)}</span> → <span class="new">${esc(c.new)}</span></div>`).join('')}</div>`).join('');
}
function setStatus(ok){document.getElementById('statusDot').style.background = ok ? '#2D7A55' : '#E05252';document.getElementById('statusText').textContent = ok ? '연결됨' : '오프라인';}
let toastTimer=null;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}
loadData();
</script>
</body>
</html>
