<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOXTIX · 내부 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--text:#1A1A1A;--sub:#999;--border:#E8E8E4;--radius:16px}
html,body{height:100vh;background:#fff;font-family:"Noto Sans KR",sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.header{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:36px}
.header img{height:24px;margin-bottom:16px}
.header-label{font-size:12px;color:#C8C8C4;font-family:"DM Mono",monospace;letter-spacing:.1em;text-transform:uppercase}
.cards{display:flex;gap:12px;width:100%;max-width:500px;padding:0 20px}
.card{display:block;text-decoration:none;color:var(--text);background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:28px 24px;transition:all .2s;cursor:pointer;flex:1}
.card:hover{border-color:var(--text);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.07)}
.card:active{transform:translateY(0);box-shadow:none}
.card-icon{font-size:22px;margin-bottom:12px;display:block}
.card-title{font-size:14px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.card-desc{font-size:12px;color:var(--sub);line-height:1.6}
.footer{margin-top:32px}
.footer-text{font-size:11px;color:#DADAD6;font-family:"DM Mono",monospace;letter-spacing:.08em;text-transform:uppercase}
@media(max-width:520px){
  html,body{height:auto;min-height:100vh;justify-content:center;overflow:auto;padding:60px 0 48px}
  .cards{flex-direction:column;max-width:100%}
}
</style>
</head>
