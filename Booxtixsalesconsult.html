<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BOOXTIX · 1차 문의 접수 v5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F7F5;--card:#fff;--text:#1A1A1A;--sub:#888;--border:#E8E8E4;--soft:#F5F5F3;--err:#E05252;--ok:#2D7A55;--radius:16px}
html,body{min-height:100vh;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);-webkit-tap-highlight-color:transparent}
body{padding-bottom:96px}.header{background:#fff;border-bottom:1px solid var(--border);padding:18px 18px 14px;position:sticky;top:0;z-index:20}.header-inner{max-width:720px;margin:0 auto}.brand{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--sub);text-transform:uppercase;text-align:center}.brand b{color:var(--text)}.headline{max-width:720px;margin:0 auto;padding:28px 18px 14px}.eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--sub);text-transform:uppercase;margin-bottom:8px}.title{font-size:26px;font-weight:900;letter-spacing:-.04em;line-height:1.22}.desc{font-size:13px;color:var(--sub);line-height:1.55;margin-top:8px}.container{max-width:720px;margin:0 auto;padding:0 18px 28px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:0 8px 26px rgba(0,0,0,.035)}.section-title{font-size:12px;font-weight:800;color:#555;margin-bottom:14px;letter-spacing:-.01em}.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field-group{margin-bottom:17px}.field-label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:8px}.required{color:var(--err);font-weight:900;margin-left:2px}.optional{color:#BBB;font-size:10px;font-weight:600;margin-left:6px}input[type=text],input[type=tel],input[type=date],input[type=time],select,textarea{width:100%;padding:13px 14px;border:1px solid var(--border);border-radius:11px;font-size:15px;font-family:inherit;color:var(--text);background:#fff;transition:border-color .15s,box-shadow .15s}input:focus,select:focus,textarea:focus{outline:none;border-color:#1A1A1A;box-shadow:0 0 0 3px rgba(0,0,0,.04)}select{appearance:none;background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'%3e%3cpath d='M1 1l5 5 5-5' stroke='%23999' stroke-width='1.5' fill='none' stroke-linecap='round'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px;cursor:pointer}textarea{resize:vertical;min-height:92px;line-height:1.6}.hint{background:#FFF8E7;border:1px solid #F5DC8A;color:#75580A;border-radius:12px;padding:12px 14px;font-size:12px;line-height:1.55;margin-bottom:18px}.hidden{display:none!important}.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:14px 16px;z-index:30}.nav-inner{max-width:720px;margin:0 auto;display:flex;gap:8px}.submit-btn,.reset-btn{border-radius:12px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;transition:.15s;padding:15px 16px}.submit-btn{flex:2;background:#1A1A1A;color:#fff;border:1px solid #1A1A1A}.reset-btn{flex:1;background:#fff;color:#1A1A1A;border:1px solid var(--border)}button:disabled{opacity:.45;cursor:not-allowed}.submit-btn:hover:not(:disabled),.reset-btn:hover:not(:disabled){opacity:.86}.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:12px 20px;border-radius:999px;font-size:13px;font-weight:600;z-index:100;opacity:0;transition:.25s;pointer-events:none;max-width:calc(100vw - 32px);text-align:center}.toast.show{opacity:1;bottom:102px}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:90;align-items:center;justify-content:center;padding:20px}.modal.show{display:flex}.modal-content{background:#fff;border-radius:20px;padding:30px 24px;max-width:380px;width:100%;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.16)}.modal-icon{font-size:44px;margin-bottom:10px}.modal-title{font-size:20px;font-weight:900;margin-bottom:8px;letter-spacing:-.03em}.modal-desc{font-size:13px;color:var(--sub);line-height:1.6;margin-bottom:18px}.modal-btn{width:100%;padding:14px;border:0;border-radius:12px;background:#1A1A1A;color:#fff;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer}.mini{font-size:11px;color:#AAA;margin-top:8px;line-height:1.45}
@media(max-width:520px){.field-row{grid-template-columns:1fr}.title{font-size:23px}.card{padding:18px}}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><div class="brand"><b>BOOXTIX</b> · 1차 문의 접수</div></div></header>
<section class="headline">
  <div class="eyebrow">MARKETER INTAKE</div>
  <h1 class="title">문의 기본정보만 빠르게 등록</h1>
  <p class="desc">마케터는 고객의 1차 정보만 입력합니다. 상담상태, 작업형태, 통화녹음, 답변메모, 다음액션은 관리자 페이지에서 이어서 작성합니다.</p>
</section>
<main class="container">
  <form id="leadForm" class="card" onsubmit="submitLead(event)">
    <div class="hint"><b>저장 흐름</b><br>접수 저장 후 관리자 페이지의 <b>기본</b> 탭에 바로 표시됩니다. 이후 <b>상담</b> 탭에서 1차 상담을 완료하고 다음액션을 관리합니다.</div>
    <div class="section-title">1차 접수 기본정보</div>

    <div class="field-row">
      <div class="field-group"><label class="field-label">문의 일자 <span class="required">*</span></label><input type="date" id="f-inquiry-date" required></div>
      <div class="field-group"><label class="field-label">문의 시간 <span class="required">*</span></label><input type="time" id="f-inquiry-time" required></div>
    </div>

    <div class="field-row">
      <div class="field-group"><label class="field-label">이름 <span class="required">*</span></label><input type="text" id="f-name" placeholder="예: 김부스" autocomplete="name" required></div>
      <div class="field-group"><label class="field-label">연락처 <span class="required">*</span></label><input type="tel" id="f-phone" placeholder="010-0000-0000" maxlength="13" autocomplete="tel" required></div>
    </div>

    <div class="field-row">
      <div class="field-group"><label class="field-label">점포 유/무 <span class="required">*</span></label><select id="f-has-store" required><option value="">선택</option><option>점포 있음</option><option>점포 없음</option><option>확인 필요</option></select></div>
      <div class="field-group"><label class="field-label">창업 희망지역 <span class="required">*</span></label><input type="text" id="f-desired-region" placeholder="예: 부산 서면 / 김해 장유" required></div>
    </div>

    <div class="field-group"><label class="field-label">유입경로 <span class="required">*</span></label><select id="f-source" onchange="toggleSourceEtc()" required><option value="">선택</option><option>홈페이지</option><option>네이버</option><option>인스타그램</option><option>블로그</option><option>지인소개</option><option>광고</option><option>기존 고객</option><option>기타</option></select></div>

    <div class="field-group hidden" id="sourceEtcWrap"><label class="field-label">기타 유입경로 직접 입력 <span class="required">*</span></label><input type="text" id="f-source-etc" placeholder="예: 박람회, 전단지, 오픈채팅 등"></div>

    <div class="field-group"><label class="field-label">비고 <span class="optional">선택</span></label><textarea id="f-note" placeholder="마케터가 남겨야 할 짧은 메모를 적어주세요. 예: 오후 3시 이후 통화 가능, 김해점 보고 문의 등"></textarea></div>
    <div class="mini">초기 상태: 1차 접수 완료 / 1차 상담 미작성 / 다음액션 상담 대기</div>
  </form>
</main>

<div class="nav-bar"><div class="nav-inner"><button class="reset-btn" type="button" onclick="resetForm()">초기화</button><button class="submit-btn" id="submitBtn" type="submit" form="leadForm">접수 저장</button></div></div>
<div class="toast" id="toast"></div>
<div class="modal" id="successModal"><div class="modal-content"><div class="modal-icon">✅</div><div class="modal-title">1차 문의 접수 완료</div><div class="modal-desc" id="successDesc">관리자 페이지 기본 탭에서 확인할 수 있습니다.</div><button class="modal-btn" onclick="closeSuccess()">새 문의 등록</button></div></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzG8j8CW4nktZs-erFLTCGFLZqYDQFcfLeyWbmnHDilvWzCxGN8YvOANXPPfRViBTZIQw/exec";
let toastTimer = null;

function getKstNowParts(){
  const parts = new Intl.DateTimeFormat('en-CA', {timeZone:'Asia/Seoul', year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false}).formatToParts(new Date());
  const m = Object.fromEntries(parts.map(p => [p.type, p.value]));
  return {date:`${m.year}-${m.month}-${m.day}`, time:`${m.hour}:${m.minute}`};
}
function setNow(){const now = getKstNowParts();document.getElementById('f-inquiry-date').value = now.date;document.getElementById('f-inquiry-time').value = now.time;}
function toggleSourceEtc(){const isEtc = document.getElementById('f-source').value === '기타';const wrap = document.getElementById('sourceEtcWrap');const input = document.getElementById('f-source-etc');wrap.classList.toggle('hidden', !isEtc);input.required = isEtc;if(!isEtc) input.value = '';}
document.getElementById('f-phone').addEventListener('input', e => {let v = e.target.value.replace(/[^\d]/g, '');if(v.length > 11) v = v.slice(0, 11);if(v.length >= 7) v = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7);else if(v.length >= 4) v = v.slice(0,3) + '-' + v.slice(3);e.target.value = v;});
function showToast(msg){const t = document.getElementById('toast');t.textContent = msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer = setTimeout(() => t.classList.remove('show'), 2600);}
function makeId(){return 'BTX-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).slice(2,6).toUpperCase();}
function resetForm(){document.getElementById('leadForm').reset();toggleSourceEtc();setNow();}
function closeSuccess(){document.getElementById('successModal').classList.remove('show');resetForm();}
function buildPayload(){
  const source = document.getElementById('f-source').value;
  const sourceEtc = document.getElementById('f-source-etc').value.trim();
  const inquiryDate = document.getElementById('f-inquiry-date').value;
  const inquiryTime = document.getElementById('f-inquiry-time').value;
  const id = makeId();
  return {
    id, consultId:id, createdAt:new Date().toISOString(), sourcePage:'1차 문의 접수',
    inquiryDate, inquiryTime, inquiryDateTime:`${inquiryDate} ${inquiryTime}`,
    name:document.getElementById('f-name').value.trim(),
    phone:document.getElementById('f-phone').value.trim(),
    hasStore:document.getElementById('f-has-store').value,
    desiredRegion:document.getElementById('f-desired-region').value.trim(),
    source: source === '기타' ? (sourceEtc || '기타') : source,
    sourceType:source, sourceEtc,
    note:document.getElementById('f-note').value.trim(),
    workflowStatus:'1차 접수 완료',
    firstConsultStatus:'미작성',
    callStatus:'', workType:'', currentSituation:'', inquiryTopic:'', detailInquiryMemo:'', answerType:'', answerMemo:'',
    nextStep:'상담 대기', nextActionDetail:'', nextActionDate:'', nextActionTime:'', nextActionOwner:'', nextActionMemo:'',
    finalStatus:'신규 문의'
  };
}
async function submitLead(e){
  e.preventDefault();
  const form = document.getElementById('leadForm');
  if(!form.reportValidity()) return;
  if(document.getElementById('f-source').value === '기타' && !document.getElementById('f-source-etc').value.trim()){showToast('⚠ 기타 유입경로를 입력해주세요');document.getElementById('f-source-etc').focus();return;}
  const btn = document.getElementById('submitBtn');btn.disabled = true;btn.textContent = '저장 중...';
  try{
    const payload = buildPayload();
    const fd = new FormData();fd.append('action','create');fd.append('data', JSON.stringify(payload));
    const res = await fetch(APPS_SCRIPT_URL, {method:'POST', body:fd});
    const text = await res.text();let result = {};try{result = JSON.parse(text);}catch(err){result = {result: res.ok ? 'success' : 'error', raw:text};}
    if(!res.ok || (result.result && result.result !== 'success') || (result.status && !['success','ok'].includes(result.status))){throw new Error(result.error || result.message || '저장 실패');}
    document.getElementById('successDesc').innerHTML = `접수번호 <b>${result.consultId || result.id || payload.id}</b><br>관리자 페이지 기본 탭에서 확인할 수 있습니다.`;
    document.getElementById('successModal').classList.add('show');
  }catch(err){showToast('⚠ 저장 실패: ' + err.message);}finally{btn.disabled = false;btn.textContent = '접수 저장';}
}
setNow();toggleSourceEtc();
</script>
</body>
</html>
