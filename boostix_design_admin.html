<html lang="ko">
<head>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F6F6F3;--panel:#FFFFFF;--text:#151515;--sub:#8B8B84;--line:#E5E3DD;
  --soft:#F0EFEA;--dark:#151515;--good:#297A4A;--good-bg:#EAF5EE;
  --warn:#9A6A18;--warn-bg:#FFF4D8;--danger:#B04747;--danger-bg:#FBEAEA;
  --blue:#315E9E;--blue-bg:#EAF1FB;--gray:#667085;--gray-bg:#F2F4F7;--radius:18px;
}
html{font-size:16px}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button,input,select,textarea{font-family:inherit}
a{color:inherit}.hidden{display:none!important}
.topbar{position:sticky;top:0;z-index:50;background:rgba(246,246,243,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1440px;margin:0 auto;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;flex-direction:column;gap:2px}.brand-kicker{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.16em;color:var(--sub)}
.brand-title{font-size:22px;font-weight:900;letter-spacing:-.04em}.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:800;cursor:pointer;transition:.15s;white-space:nowrap;text-decoration:none;color:var(--text)}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(0,0,0,.06)}.btn.dark{background:var(--dark);color:#fff;border-color:var(--dark)}.btn.ghost{background:transparent}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.wrap{max-width:1440px;margin:0 auto;padding:20px 22px 34px}.notice{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px 16px;margin-bottom:14px;color:#666;font-size:12px;line-height:1.6}
.notice b{color:#151515}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
.stat-label{font-size:11px;color:var(--sub);font-weight:800;letter-spacing:.08em}.stat-value{font-family:"DM Mono",monospace;font-size:27px;font-weight:500;margin-top:6px}.stat-sub{font-size:11px;color:var(--sub);margin-top:4px}
.toolbar{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px;display:grid;grid-template-columns:1.3fr 180px 140px;gap:10px;margin-bottom:14px}
.search,.select{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 13px;font-size:14px;outline:none}.search:focus,.select:focus{border-color:#151515}
.main{display:grid;grid-template-columns:430px minmax(0,1fr);gap:14px;align-items:start}.list-panel,.detail-panel{background:var(--panel);border:1px solid var(--line);border-radius:24px;overflow:hidden}
.list-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.panel-title{font-size:14px;font-weight:900;letter-spacing:-.02em}.mono{font-family:"DM Mono",monospace}
.list{max-height:calc(100vh - 340px);overflow:auto;padding:10px}.item{border:1px solid transparent;border-radius:18px;padding:14px;cursor:pointer;transition:.14s;background:#fff;margin-bottom:8px}
.item:hover{background:#FAFAF8;border-color:var(--line)}.item.active{background:#151515;color:#fff;border-color:#151515;box-shadow:0 12px 24px rgba(0,0,0,.12)}.item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:9px}
.item-id{font-family:"DM Mono",monospace;font-size:11px;color:var(--sub)}.item.active .item-id,.item.active .item-sub,.item.active .meta{color:rgba(255,255,255,.65)}.item-title{font-size:15px;font-weight:900;letter-spacing:-.03em;line-height:1.35;word-break:break-word}.item-sub{font-size:12px;color:var(--sub);margin-top:3px;line-height:1.45}.meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.meta{font-size:11px;color:var(--sub);background:#F2F1EC;border-radius:20px;padding:4px 8px}.item.active .meta{background:rgba(255,255,255,.12)}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900;white-space:nowrap;border:1px solid transparent}.b-접수{background:#F2F1EC;color:#555}.b-검토중,.b-작업중,.b-수정중{background:var(--blue-bg);color:var(--blue)}.b-1차전달,.b-승인대기{background:var(--warn-bg);color:var(--warn)}.b-완료{background:var(--good-bg);color:var(--good)}.b-보류,.b-취소{background:var(--danger-bg);color:var(--danger)}.b-읽기전용{background:var(--gray-bg);color:var(--gray)}.item.active .badge{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.08)}
.detail-empty{padding:80px 20px;text-align:center;color:var(--sub)}.detail{display:grid;grid-template-columns:minmax(0,1fr) 330px;min-height:calc(100vh - 290px)}.detail-main{padding:24px;min-width:0}.detail-side{border-left:1px solid var(--line);background:#FAFAF8;padding:18px}.detail-kicker{font-family:"DM Mono",monospace;font-size:11px;color:var(--sub);margin-bottom:6px}.detail-title{font-size:30px;font-weight:900;letter-spacing:-.05em;line-height:1.2;margin-bottom:8px}.detail-desc{color:var(--sub);font-size:13px;line-height:1.6}.detail-status-row{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 18px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}.info{border:1px solid var(--line);border-radius:14px;padding:12px 13px;background:#fff}.info-label{font-size:10px;font-weight:900;color:var(--sub);letter-spacing:.08em;margin-bottom:5px}.info-value{font-size:13px;font-weight:700;line-height:1.45;word-break:break-word}.section{border-top:1px solid var(--line);padding-top:18px;margin-top:18px}.section h3{font-size:14px;margin-bottom:10px}.textbox{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px;font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word}.link-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.link-card{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;background:#fff;border:1px solid var(--line);border-radius:14px;text-decoration:none;font-size:13px;font-weight:900;transition:.14s;min-width:0}.link-card:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(0,0,0,.06)}.link-card span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.side-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}.side-title{font-size:13px;font-weight:900;margin-bottom:8px}.side-text{font-size:12px;line-height:1.65;color:#666}.raw-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}.raw-table th,.raw-table td{text-align:left;vertical-align:top;border-bottom:1px solid #eee;padding:7px 3px;word-break:break-word}.raw-table th{color:#999;width:90px}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);background:#151515;color:#fff;border-radius:999px;padding:12px 18px;font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:.25s;z-index:100}.toast.show{opacity:1;transform:translate(-50%,0)}.loading{padding:44px 20px;text-align:center;color:var(--sub);font-size:13px}.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--line);border-top-color:#151515;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:980px){.stats{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr}.main{grid-template-columns:1fr}.list{max-height:none}.detail{grid-template-columns:1fr}.detail-side{border-left:none;border-top:1px solid var(--line)}.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.topbar-inner{align-items:flex-start;flex-direction:column}.top-actions{width:100%}.top-actions .btn{flex:1;text-align:center}.wrap{padding:14px 12px 24px}.stats{grid-template-columns:1fr 1fr;gap:8px}.stat{padding:13px}.detail-main,.detail-side{padding:16px}.detail-title{font-size:24px}.grid,.link-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-kicker">BOOXTIX DESIGN REQUEST ADMIN</div>
      <div class="brand-title">디자인 작업요청 관리자</div>
    </div>
    <div class="top-actions">
      <button class="btn ghost" onclick="loadRequests()">새로고침</button>
      <button class="btn" onclick="openCsv()">API 확인</button>
      <a class="btn dark" id="sheetLink" href="#" target="_blank" style="text-decoration:none">시트 열기</a>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="notice">
    <b>관리자 전용 읽기 방식:</b> 요청서 제출 페이지와 <b>같은 Apps Script 배포 URL</b>의 <b>doGet?action=list</b> API로 읽습니다. CSV가 아니라 저장 API와 같은 통로를 씁니다.
  </div>

  <section class="stats">
    <div class="stat"><div class="stat-label">TOTAL</div><div class="stat-value" id="stTotal">0</div><div class="stat-sub">전체 요청</div></div>
    <div class="stat"><div class="stat-label">ACTIVE</div><div class="stat-value" id="stActive">0</div><div class="stat-sub">완료/취소 제외</div></div>
    <div class="stat"><div class="stat-label">DONE</div><div class="stat-value" id="stDone">0</div><div class="stat-sub">완료 상태</div></div>
    <div class="stat"><div class="stat-label">URGENT</div><div class="stat-value" id="stUrgent">0</div><div class="stat-sub">긴급 우선순위</div></div>
  </section>

  <section class="toolbar">
    <input class="search" id="searchInput" placeholder="프로젝트명, 발주자, 요청번호 검색" oninput="renderList()">
    <select class="select" id="statusFilter" onchange="renderList()">
      <option value="">전체 상태</option>
      <option value="접수">접수</option>
      <option value="검토중">검토중</option>
      <option value="작업중">작업중</option>
      <option value="1차전달">1차전달</option>
      <option value="수정중">수정중</option>
      <option value="승인대기">승인대기</option>
      <option value="완료">완료</option>
      <option value="보류">보류</option>
      <option value="취소">취소</option>
    </select>
    <select class="select" id="sortMode" onchange="renderList()">
      <option value="new">최신순</option>
      <option value="due">마감일순</option>
      <option value="urgent">긴급우선</option>
    </select>
  </section>

  <section class="main">
    <aside class="list-panel">
      <div class="list-head">
        <div class="panel-title">요청 리스트</div>
        <div class="mono" id="listCount" style="font-size:12px;color:var(--sub)">0건</div>
      </div>
      <div class="list" id="requestList"><div class="loading"><span class="spinner"></span>시트 읽는 중...</div></div>
    </aside>

    <section class="detail-panel" id="detailPanel">
      <div class="detail-empty">왼쪽 요청을 클릭하면 상세 내용이 열린다. 🧾</div>
    </section>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
const SPREADSHEET_ID = "1ZJToDWEmJUbsj8dC5qasTAfqwX3yN8qV0kEHGIOK5M4";
const SHEET_NAME = "업무요청서";
const SHEET_VIEW_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/edit`;
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz3RylMFebodpeqV8l-UvplvtFOD6ge5l7oL_ZzYKaqPFzNUDmFI0W9c9XkvC0zmP1D/exec";
const STATUS_OPTIONS = ["접수","검토중","작업중","1차전달","수정중","승인대기","완료","보류","취소"];

let allRequests = [];
let filteredRequests = [];
let selectedId = "";
let toastTimer = null;

document.getElementById("sheetLink").href = SHEET_VIEW_URL;
function openCsv(){ window.open(`${APPS_SCRIPT_URL}?action=list&cacheBust=${Date.now()}`, "_blank"); }

async function callAppsScript(action, params = {}){
  const query = new URLSearchParams({ action, _: Date.now(), ...params });
  const url = `${APPS_SCRIPT_URL}?${query.toString()}`;

  const res = await fetch(url, { method:"GET", cache:"no-store" });
  const text = await res.text();
  const trimmed = text.trim();

  if(!res.ok){
    throw new Error(`Apps Script 응답 오류: ${res.status}`);
  }

  if(trimmed.startsWith("<")){
    throw new Error("Apps Script가 JSON이 아니라 HTML을 반환했습니다. 배포 권한 또는 URL을 확인해주세요.");
  }

  let data;
  try{
    data = JSON.parse(trimmed);
  }catch(err){
    throw new Error("Apps Script 응답을 JSON으로 읽지 못했습니다. API 확인 버튼으로 응답 내용을 확인해주세요.");
  }

  if(!data) throw new Error("Apps Script 응답이 비어 있습니다.");
  if(data.result === "error") throw new Error(data.message || "Apps Script 오류");

  return data;
}

async function loadRequests(){
  document.getElementById("requestList").innerHTML = '<div class="loading"><span class="spinner"></span>Apps Script API에서 시트 읽는 중...</div>';
  try{
    const payload = await callAppsScript("list");
    const rows = Array.isArray(payload.data) ? payload.data : [];

    allRequests = rows
      .map(normalizeApiItem)
      .filter(item => item["요청번호"] || item["프로젝트명"] || item["발주자"]);

    if(!selectedId && allRequests[0]) selectedId = allRequests[0]["요청번호"];
    if(selectedId && !allRequests.some(r => r["요청번호"] === selectedId)) selectedId = allRequests[0] ? allRequests[0]["요청번호"] : "";

    setStats();
    renderList();
    renderDetail(getSelected());
    toast(`요청 ${allRequests.length}건 로드 완료`);
  }catch(err){
    console.error(err);
    document.getElementById("requestList").innerHTML = `<div class="loading">⚠ ${escapeHtml(err.message)}<br><br>요청서 제출 페이지와 같은 Apps Script 배포 URL인지 확인해주세요.</div>`;
    document.getElementById("detailPanel").innerHTML = '<div class="detail-empty">데이터를 불러오지 못했습니다.</div>';
    toast(err.message);
  }
}

function normalizeApiItem(item){
  const obj = { ...(item || {}) };
  obj._sourceMode = "Apps Script API";
  obj["요청번호"] = clean(obj["요청번호"] || obj.requestId || obj.id || "");
  obj["상태"] = clean(obj["상태"] || "접수");
  obj["발주일자"] = shortDate(obj["발주일자"]);
  obj["완성희망일"] = shortDate(obj["완성희망일"]);
  obj["1차시안일"] = shortDate(obj["1차시안일"]);
  obj.imageLinks = Array.isArray(obj.imageLinks) ? obj.imageLinks : splitLinks(obj["첨부사진링크"]);
  obj.isDone = obj.isDone === true || isDoneValue(obj["완료체크"]) || obj["상태"] === "완료" || !!obj["완료일"];
  if(obj.isDone && obj["상태"] === "접수") obj["상태"] = "완료";
  obj._raw = Object.keys(obj)
    .filter(k => !String(k).startsWith("_") && k !== "imageLinks" && k !== "isDone")
    .map(k => [k, Array.isArray(obj[k]) ? obj[k].join("\n") : clean(obj[k])])
    .filter(([,v]) => v !== "");
  return obj;
}

function normalizeSheetRow(headers, row, rowNumber){
  const first = clean(row[0]);
  const isNewPositional = /^WO-\d{8}-\d{3}/.test(first) || /^WO-/.test(first);
  const get = name => {
    const idx = headers.indexOf(name);
    return idx >= 0 ? clean(row[idx]) : "";
  };

  let obj;

  if(isNewPositional){
    obj = {
      rowNumber,
      _sourceMode:"WO 위치기준",
      "요청번호": clean(row[0]) || `ROW-${rowNumber}`,
      "상태": clean(row[1]) || "접수",
      "완료체크": clean(row[2]),
      "담당자": clean(row[3]),
      "제출일시": clean(row[4]),
      "프로젝트명": clean(row[5]),
      "발주부서": clean(row[6]),
      "발주자": clean(row[7]),
      "발주일자": shortDate(clean(row[8])),
      "완성희망일": shortDate(clean(row[9])),
      "1차시안일": shortDate(clean(row[10])),
      "수량": clean(row[11]),
      "소재": clean(row[12]),
      "사용용도": clean(row[13]),
      "사용장소": clean(row[14]),
      "사이즈": clean(row[15]),
      "작업유형": clean(row[16]),
      "들어갈내용": clean(row[17]),
      "희망이미지설명": clean(row[18]),
      "선택색상": clean(row[19]),
      "스타일값": clean(row[20]),
      "일반주의사항": clean(row[21]),
      "배송지": clean(row[22]),
      "배송메모": clean(row[23]),
      "우선순위": clean(row[24]),
      "첨부사진링크": clean(row[25]),
      "HTML보기": clean(row[26]),
      "폴더링크": clean(row[27]),
      "수정횟수": clean(row[28]),
      "최종파일링크": clean(row[29]),
      "완료일": clean(row[30]),
      "내부메모": clean(row[31])
    };
  }else{
    obj = {
      rowNumber,
      _sourceMode:"현재 헤더기준",
      "요청번호": get("요청번호") || `ROW-${rowNumber}`,
      "상태": get("상태") || inferStatus(get("디자인팀비고") || get("내부메모")),
      "완료체크": get("완료체크"),
      "담당자": get("담당자"),
      "제출일시": get("제출일시"),
      "프로젝트명": get("프로젝트명"),
      "발주부서": get("발주부서"),
      "발주자": get("발주자"),
      "발주일자": shortDate(get("발주일자")),
      "완성희망일": shortDate(get("완성희망일")),
      "1차시안일": shortDate(get("1차시안일")),
      "수량": get("수량"),
      "소재": get("소재"),
      "사용용도": get("사용용도"),
      "사용장소": get("사용장소"),
      "사이즈": get("사이즈"),
      "작업유형": get("작업유형"),
      "들어갈내용": get("들어갈내용"),
      "희망이미지설명": get("희망이미지") || get("희망이미지설명"),
      "선택색상": get("선택색상"),
      "스타일값": get("스타일값"),
      "일반주의사항": get("주의사항") || get("일반주의사항"),
      "배송지": get("배송지"),
      "배송메모": get("배송메모"),
      "우선순위": get("우선순위"),
      "첨부사진링크": get("첨부사진링크"),
      "HTML보기": get("HTML보기"),
      "폴더링크": get("폴더링크"),
      "수정횟수": get("수정횟수") || "0",
      "최종파일링크": get("최종파일링크"),
      "완료일": get("완료일"),
      "내부메모": get("내부메모") || get("디자인팀비고")
    };
  }

  obj.imageLinks = splitLinks(obj["첨부사진링크"]);
  obj.isDone = isDoneValue(obj["완료체크"]) || obj["상태"] === "완료" || !!obj["완료일"];
  if(obj.isDone && obj["상태"] === "접수") obj["상태"] = "완료";
  obj._raw = headers.map((h,i) => [h || columnName(i), clean(row[i])]).filter(([,v]) => v);
  return obj;
}

function inferStatus(text){
  const s = String(text || "");
  if(s.includes("완료")) return "완료";
  if(s.includes("보류")) return "보류";
  if(s.includes("수정")) return "수정중";
  if(s.includes("작업")) return "작업중";
  return "접수";
}

function parseCSV(text){
  const rows = [];
  let row = [];
  let value = "";
  let inQuotes = false;

  for(let i=0;i<text.length;i++){
    const c = text[i];
    const next = text[i+1];

    if(inQuotes){
      if(c === '"' && next === '"'){
        value += '"';
        i++;
      }else if(c === '"'){
        inQuotes = false;
      }else{
        value += c;
      }
    }else{
      if(c === '"'){
        inQuotes = true;
      }else if(c === ','){
        row.push(value);
        value = "";
      }else if(c === '\n'){
        row.push(value);
        rows.push(row);
        row = [];
        value = "";
      }else if(c !== '\r'){
        value += c;
      }
    }
  }

  row.push(value);
  rows.push(row);
  return rows;
}

function setStats(){
  const total = allRequests.length;
  const done = allRequests.filter(x => x.isDone).length;
  const active = allRequests.filter(x => !x.isDone && x["상태"] !== "취소").length;
  const urgent = allRequests.filter(x => String(x["우선순위"] || "").includes("긴급")).length;
  document.getElementById("stTotal").textContent = total;
  document.getElementById("stActive").textContent = active;
  document.getElementById("stDone").textContent = done;
  document.getElementById("stUrgent").textContent = urgent;
}

function getSelected(){ return allRequests.find(r => r["요청번호"] === selectedId) || null; }

function getFiltered(){
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const status = document.getElementById("statusFilter").value;
  const sort = document.getElementById("sortMode").value;

  let arr = allRequests.filter(r => {
    const blob = [
      r["요청번호"], r["프로젝트명"], r["발주자"], r["발주부서"], r["들어갈내용"], r["작업유형"], r["내부메모"], r["희망이미지설명"]
    ].join(" ").toLowerCase();
    return (!q || blob.includes(q)) && (!status || r["상태"] === status);
  });

  if(sort === "due"){
    arr.sort((a,b)=>String(a["완성희망일"]||"9999").localeCompare(String(b["완성희망일"]||"9999")));
  }else if(sort === "urgent"){
    arr.sort((a,b)=>urgentScore(b)-urgentScore(a));
  }else{
    arr.sort((a,b)=>String(b["제출일시"]||b["요청번호"]).localeCompare(String(a["제출일시"]||a["요청번호"])));
  }
  return arr;
}

function urgentScore(r){
  const p = String(r["우선순위"]||"");
  if(p.includes("긴급")) return 3;
  if(p.includes("높음")) return 2;
  if(p.includes("보통")) return 1;
  return 0;
}

function renderList(){
  filteredRequests = getFiltered();
  document.getElementById("listCount").textContent = filteredRequests.length + "건";

  if(!filteredRequests.length){
    document.getElementById("requestList").innerHTML = '<div class="loading">조건에 맞는 요청이 없습니다.</div>';
    renderDetail(null);
    return;
  }

  if(!selectedId || !filteredRequests.some(r => r["요청번호"] === selectedId)) selectedId = filteredRequests[0]["요청번호"];

  document.getElementById("requestList").innerHTML = filteredRequests.map(r => {
    const id = r["요청번호"];
    const active = id === selectedId ? " active" : "";
    const status = r["상태"] || "접수";
    const doneMark = r.isDone ? "✓ " : "";
    return `
      <div class="item${active}" onclick="selectRequest('${escapeAttr(id)}')">
        <div class="item-top">
          <div style="min-width:0">
            <div class="item-id">${escapeHtml(id)}</div>
            <div class="item-title">${doneMark}${escapeHtml(r["프로젝트명"] || "제목 없음")}</div>
            <div class="item-sub">${escapeHtml(r["발주자"] || "-")} · ${escapeHtml(r["발주부서"] || "-")}</div>
          </div>
          <span class="badge b-${escapeClass(status)}">${escapeHtml(status)}</span>
        </div>
        <div class="meta-row">
          <span class="meta">마감 ${escapeHtml(shortDate(r["완성희망일"]) || "-")}</span>
          <span class="meta">첨부 ${(r.imageLinks||[]).length}개</span>
          <span class="meta">${escapeHtml(r["우선순위"] || "우선순위 없음")}</span>
        </div>
      </div>`;
  }).join("");

  renderDetail(getSelected());
}

function selectRequest(id){
  selectedId = id;
  renderList();
  renderDetail(getSelected());
  if(window.innerWidth < 980) document.getElementById("detailPanel").scrollIntoView({behavior:"smooth",block:"start"});
}

function renderDetail(r){
  const panel = document.getElementById("detailPanel");
  if(!r){
    panel.innerHTML = '<div class="detail-empty">선택된 요청이 없습니다.</div>';
    return;
  }

  const status = r["상태"] || "접수";
  const images = r.imageLinks || [];
  const links = [
    r["HTML보기"] ? ["요청서 HTML", r["HTML보기"]] : null,
    r["폴더링크"] ? ["업로드 폴더", r["폴더링크"]] : null,
    r["최종파일링크"] ? ["최종 파일", r["최종파일링크"]] : null
  ].filter(Boolean);

  panel.innerHTML = `
    <div class="detail">
      <div class="detail-main">
        <div class="detail-kicker">${escapeHtml(r["요청번호"])} · ${escapeHtml(r._sourceMode || "시트 직접조회")}</div>
        <h1 class="detail-title">${escapeHtml(r["프로젝트명"] || "제목 없음")}</h1>
        <div class="detail-desc">
          제출 ${escapeHtml(r["제출일시"] || "-")} · 발주자 ${escapeHtml(r["발주자"] || "-")}
        </div>
        <div class="detail-status-row">
          <span class="badge b-${escapeClass(status)}">${escapeHtml(status)}</span>
          <span class="badge b-${r.isDone ? "완료" : "읽기전용"}">${r.isDone ? "작업완료" : "진행중"}</span>
          <span class="badge b-읽기전용">수정 ${escapeHtml(r["수정횟수"] || 0)}회</span>
          ${r["우선순위"] ? `<span class="badge b-1차전달">${escapeHtml(r["우선순위"])}</span>` : ""}
        </div>

        <div class="grid">
          ${info("발주부서", r["발주부서"])}
          ${info("발주자", r["발주자"])}
          ${info("발주일자", shortDate(r["발주일자"]))}
          ${info("완성희망일", shortDate(r["완성희망일"]))}
          ${info("1차시안일", shortDate(r["1차시안일"]))}
          ${info("담당자", r["담당자"] || "-")}
          ${info("수량", r["수량"])}
          ${info("소재", r["소재"])}
          ${info("사이즈", r["사이즈"])}
          ${info("사용용도", r["사용용도"])}
          ${info("사용장소", r["사용장소"])}
          ${info("작업유형", r["작업유형"])}
        </div>

        ${sectionText("들어갈 내용", r["들어갈내용"])}
        ${sectionText("희망 이미지 / 레퍼런스", r["희망이미지설명"])}
        ${sectionText("선택 색상", r["선택색상"])}
        ${sectionText("스타일값", r["스타일값"])}
        ${sectionText("주의사항", r["일반주의사항"])}
        ${sectionText("배송지", [r["배송지"], r["배송메모"]].filter(Boolean).join("\n"))}
        ${sectionText("디자인팀 비고 / 내부메모", r["내부메모"])}

        <div class="section">
          <h3>올린 파일 / 보기 링크</h3>
          <div class="link-grid">
            ${links.map(([label,url])=>linkCard(label,url)).join("") || '<div class="textbox">아직 링크가 없습니다.</div>'}
            ${images.map((url,i)=>linkCard("첨부사진 " + (i+1), url)).join("")}
          </div>
        </div>
      </div>

      <aside class="detail-side">
        <div class="side-card">
          <div class="side-title">현재 버전 안내</div>
          <div class="side-text">
            이 관리자 화면은 <b>Apps Script를 건드리지 않고</b> 업무요청서 시트를 직접 읽는 조회 전용 버전입니다.<br><br>
            기존 접수 저장, 구글드라이브 업로드, HTML 요청서 생성 흐름은 그대로 유지됩니다.
          </div>
        </div>
        <div class="side-card">
          <div class="side-title">빠른 링크</div>
          <div class="link-grid" style="grid-template-columns:1fr">
            <a class="link-card" href="${escapeAttr(SHEET_VIEW_URL)}" target="_blank"><span>구글시트 열기</span><b>↗</b></a>
            ${r["폴더링크"] ? `<a class="link-card" href="${escapeAttr(r["폴더링크"])}" target="_blank"><span>요청 폴더 열기</span><b>↗</b></a>` : ""}
            ${r["HTML보기"] ? `<a class="link-card" href="${escapeAttr(r["HTML보기"])}" target="_blank"><span>HTML 요청서 열기</span><b>↗</b></a>` : ""}
          </div>
        </div>
        <div class="side-card">
          <div class="side-title">원본 행 데이터</div>
          <div class="side-text">시트에서 읽어온 원본 값을 확인합니다.</div>
          <table class="raw-table">
            ${r._raw.map(([k,v]) => `<tr><th>${escapeHtml(k)}</th><td>${escapeHtml(v)}</td></tr>`).join("")}
          </table>
        </div>
      </aside>
    </div>`;
}

function info(label,value){
  return `<div class="info"><div class="info-label">${escapeHtml(label)}</div><div class="info-value">${escapeHtml(value || "-")}</div></div>`;
}

function sectionText(title,body){
  if(!body) return "";
  return `<div class="section"><h3>${escapeHtml(title)}</h3><div class="textbox">${escapeHtml(body)}</div></div>`;
}

function linkCard(label,url){
  return `<a class="link-card" href="${escapeAttr(url)}" target="_blank" rel="noopener"><span>${escapeHtml(label)}</span><b>↗</b></a>`;
}

function clean(v){
  return String(v ?? "").trim();
}

function splitLinks(raw){
  return String(raw || "")
    .split(/\n|,\s*/)
    .map(s => s.trim())
    .filter(s => /^https?:\/\//.test(s));
}

function isDoneValue(v){
  const s = String(v || "").trim().toLowerCase();
  return s === "true" || s === "1" || s === "yes" || s === "완료" || s === "y";
}

function shortDate(v){
  const s = String(v || "").trim();
  if(!s) return "";
  const m = s.match(/(\d{4})[-\.\/](\d{1,2})[-\.\/](\d{1,2})/);
  if(m) return `${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;
  return s.split(" ")[0] || s;
}

function columnName(i){
  let n = i + 1;
  let s = "";
  while(n > 0){
    const r = (n - 1) % 26;
    s = String.fromCharCode(65 + r) + s;
    n = Math.floor((n - 1) / 26);
  }
  return s;
}

function escapeHtml(value){
  return String(value ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function escapeAttr(value){
  return escapeHtml(value).replace(/`/g,"&#096;");
}

function escapeClass(value){
  return String(value || "접수").replace(/[^가-힣a-zA-Z0-9_-]/g, "");
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"),2600);
}

loadRequests();
</script>
